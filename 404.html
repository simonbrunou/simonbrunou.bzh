<!doctype html>
<html lang="en">
    <head>
        <script>
            document.documentElement.classList.add('js');
            try {
                var t = localStorage.getItem('theme');
                if (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches)) {
                    document.documentElement.classList.add('light');
                }
            } catch (_) {}
        </script>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Page Not Found — Simon Brunou</title>
        <meta name="description" content="The page you're looking for doesn't exist. Return to Simon Brunou's portfolio." />
        <meta name="robots" content="noindex, follow" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦀</text></svg>"
        />
        <style>
            *, *::before, *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            :root {
                --bg: #0f0f1a;
                --bg2: #1a1a2e;
                --bg3: #222240;
                --text: #e0e0f0;
                --text2: #b0b0d0;
                --accent: #6c63ff;
                --accent2: #ff6b6b;
                --accent-glow: rgba(108, 99, 255, 0.15);
                --radius: 12px;
                --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            :root.light {
                --bg: #f0f0f8;
                --bg2: #ffffff;
                --bg3: #e0e0ee;
                --text: #1a1a2e;
                --text2: #4a4a6a;
                --accent: #5a52e0;
                --accent2: #e04040;
                --accent-glow: rgba(90, 82, 224, 0.1);
            }
            body {
                font-family:
                    "JetBrains Mono", ui-monospace, "Cascadia Code",
                    "Source Code Pro", Menlo, Consolas, monospace;
                background: var(--bg);
                color: var(--text);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
                padding: 2rem;
                -webkit-font-smoothing: antialiased;
            }
            h1 {
                font-size: clamp(4rem, 12vw, 6rem);
                font-weight: 800;
                background: linear-gradient(135deg, var(--accent), var(--accent2));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                line-height: 1.1;
            }
            .message {
                color: var(--text2);
                font-size: clamp(1rem, 2.5vw, 1.2rem);
                margin: 1rem 0 2.5rem;
                max-width: 400px;
            }
            .actions {
                display: flex;
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .actions a {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.65rem 1.3rem;
                border-radius: var(--radius);
                font-weight: 500;
                font-size: 0.9rem;
                text-decoration: none;
                transition: all var(--transition);
                font-family: inherit;
            }
            .btn-primary {
                color: #fff;
                background: var(--accent);
            }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
            }
            .btn-secondary {
                color: var(--text);
                background: var(--bg2);
                border: 1.5px solid var(--bg3);
            }
            .btn-secondary:hover {
                border-color: var(--accent);
                background: var(--bg3);
            }
            a:focus-visible {
                outline: 3px solid var(--accent);
                outline-offset: 3px;
                border-radius: 4px;
            }
            .theme-toggle {
                position: fixed;
                top: 1rem;
                right: 1rem;
                z-index: 100;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                color: var(--text2);
                padding: 0.45rem 0.65rem;
                font-size: 1rem;
                line-height: 1;
                cursor: pointer;
                transition: all var(--transition);
            }
            .theme-toggle:hover {
                color: var(--text);
                background: var(--bg3);
            }
            @media (prefers-reduced-motion: reduce) {
                * {
                    transition-duration: 0.01ms !important;
                }
            }
            @media (forced-colors: active) {
                .btn-primary {
                    border: 2px solid LinkText !important;
                }
                .btn-secondary {
                    border: 1px solid CanvasText !important;
                }
                .theme-toggle {
                    border: 1px solid CanvasText !important;
                }
            }
        </style>
    </head>
    <body>
        <button class="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
            <span id="theme-icon" aria-hidden="true">☀️</span>
        </button>

        <main>
            <h1>404</h1>
            <p class="message" id="message">This page doesn't exist. Let's get you back on track.</p>
            <div class="actions">
                <a href="/" class="btn-primary" id="home-link">Back Home</a>
                <a href="/resume/" class="btn-secondary" id="resume-link">Resume</a>
            </div>
        </main>

        <script>
            function isLight() { return document.documentElement.classList.contains("light"); }
            function updateIcon() { document.getElementById("theme-icon").textContent = isLight() ? "\uD83C\uDF19" : "\u2600\uFE0F"; }
            window.toggleTheme = function () {
                var light = !isLight();
                document.documentElement.classList.toggle("light", light);
                try { localStorage.setItem("theme", light ? "light" : "dark"); } catch (_) {}
                updateIcon();
            };
            updateIcon();
            // Restore saved language
            try {
                if (localStorage.getItem("lang") === "fr") {
                    document.documentElement.lang = "fr";
                    document.getElementById("message").textContent = "Cette page n\u2019existe pas. Revenons sur la bonne voie.";
                    document.getElementById("home-link").textContent = "Accueil";
                    document.getElementById("resume-link").textContent = "CV";
                }
            } catch (_) {}
        </script>
    </body>
</html>
