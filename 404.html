<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>404 — Simon Brunou</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #0f0f1a;
                color: #e0e0f0;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
            }
            h1 {
                font-size: 6rem;
                font-weight: 800;
                background: linear-gradient(135deg, #6c63ff, #ff6b6b);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            p {
                color: #a0a0c0;
                font-size: 1.2rem;
                margin: 1rem 0 2rem;
            }
            a {
                color: #fff;
                background: #6c63ff;
                padding: 0.7rem 1.5rem;
                border-radius: 12px;
                text-decoration: none;
                font-weight: 500;
                transition: all 0.3s;
            }
            a:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
            }
        </style>
    </head>
    <body>
        <div>
            <h1>404</h1>
            <p>This page doesn't exist. Let's get you back on track.</p>
            <a href="/">Back Home</a>
        </div>
    </body>
</html>
