<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <meta
            name="description"
            content="CV de Simon Brunou - Développeur Fullstack avec expérience en développement mobile (Android, iOS), Flutter, React Native, Rust, Kotlin, Swift, Java, JavaScript. Basé en Bretagne, France."
        />
        <meta
            name="keywords"
            content="développeur fullstack, développeur mobile, Android, iOS, Flutter, React Native, Rust, Kotlin, Swift, Java, JavaScript, Python, Spring Boot, Angular, Node.js, Docker, Proxmox, Git, GitLab CI/CD, Terraform"
        />
        <title>CV - Simon Brunou - Développeur Fullstack</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- JSON-LD structured data is generated dynamically from data.js -->

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0f0f1a;
                --bg2: #1a1a2e;
                --bg3: #222240;
                --text: #e0e0f0;
                --text2: #b0b0d0;
                --accent: #6c63ff;
                --accent2: #ff6b6b;
                --accent-glow: rgba(108, 99, 255, 0.15);
                --radius: 12px;
                --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            html {
                scroll-behavior: smooth;
                font-size: 16px;
            }
            body {
                font-family: "Inter", -apple-system, BlinkMacSystemFont,
                    "Segoe UI", Roboto, sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                overflow-x: hidden;
            }
            a {
                color: var(--accent);
                text-decoration: none;
                transition: color var(--transition);
            }
            a:hover {
                color: var(--accent2);
            }
            h1, h2, h3 {
                line-height: 1.2;
            }
            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 0 1.5rem;
            }

            /* PDF button */
            .pdf-btn {
                position: fixed;
                top: 1rem;
                right: 1rem;
                z-index: 100;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                color: var(--text);
                padding: 0.45rem 0.9rem;
                border-radius: var(--radius);
                cursor: pointer;
                font-family: inherit;
                font-size: 0.8rem;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 6px;
                transition: all var(--transition);
                letter-spacing: 0.05em;
            }
            .pdf-btn:hover {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff;
            }

            /* Hero */
            .hero {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
            }
            .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(
                        ellipse at 30% 50%,
                        var(--accent-glow),
                        transparent 60%
                    ),
                    radial-gradient(
                        ellipse at 70% 50%,
                        rgba(255, 107, 107, 0.08),
                        transparent 60%
                    );
            }
            .hero-content {
                text-align: center;
                position: relative;
                z-index: 1;
            }
            .profile-photo {
                width: 140px;
                height: 140px;
                border-radius: 50%;
                object-fit: cover;
                border: 3px solid var(--bg3);
                box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
                display: block;
                margin: 0 auto 1.5rem auto;
            }
            .hero h1 {
                font-size: clamp(2.5rem, 6vw, 4rem);
                font-weight: 800;
                letter-spacing: -0.02em;
                margin-bottom: 0.5rem;
            }
            .hero h1 .accent {
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .hero .subtitle {
                font-size: clamp(1.1rem, 2.5vw, 1.5rem);
                color: var(--text2);
                margin-bottom: 1rem;
            }
            .hero .location {
                color: var(--text2);
                font-size: 0.95rem;
                margin-bottom: 1.5rem;
            }
            .hero .location::before {
                content: "\1F4CD ";
            }
            .hero-contact {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
            }
            .hero-contact a {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.5rem 1rem;
                border: 1.5px solid var(--bg3);
                border-radius: var(--radius);
                color: var(--text) !important;
                font-size: 0.85rem;
                transition: all var(--transition);
            }
            .hero-contact a:hover {
                border-color: var(--accent);
                background: var(--accent-glow);
            }

            /* Sections */
            section {
                padding: 5rem 0;
            }
            .section-title {
                font-size: 1.8rem;
                font-weight: 700;
                margin-bottom: 2.5rem;
                position: relative;
                display: inline-block;
            }
            .section-title::after {
                content: "";
                position: absolute;
                bottom: -8px;
                left: 0;
                width: 50px;
                height: 3px;
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    var(--accent2)
                );
                border-radius: 2px;
            }

            /* About */
            .about-text {
                font-size: 1.1rem;
                color: var(--text2);
                max-width: 700px;
                line-height: 1.8;
            }

            /* Skills */
            .skills-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1.5rem;
            }
            .skill-card {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1.5rem;
                transition: all var(--transition);
            }
            .skill-card:hover {
                border-color: var(--accent);
                transform: translateY(-3px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }
            .skill-card h3 {
                font-size: 1rem;
                color: var(--text2);
                margin-bottom: 1rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
            }
            .skill-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .tag {
                padding: 0.35rem 0.75rem;
                background: var(--bg3);
                border-radius: 8px;
                font-size: 0.85rem;
                color: var(--text);
                transition: all var(--transition);
            }
            .skill-card:hover .tag {
                background: var(--accent-glow);
                color: var(--accent);
            }

            /* Timeline */
            .timeline {
                position: relative;
                padding-left: 2rem;
            }
            .timeline::before {
                content: "";
                position: absolute;
                left: 5px;
                top: 0;
                bottom: 0;
                width: 2px;
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2),
                    transparent
                );
            }
            .timeline-item {
                position: relative;
                margin-bottom: 3rem;
                padding-left: 1.5rem;
            }
            .timeline-item::before {
                content: "";
                position: absolute;
                left: -2rem;
                top: 0.4rem;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--accent);
                border: 2px solid var(--bg);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }
            .timeline-item h3 {
                font-size: 1.15rem;
                font-weight: 700;
                margin-bottom: 0.25rem;
            }
            .timeline-item .company {
                color: var(--accent);
                font-weight: 500;
                font-size: 1rem;
            }
            .timeline-item .period {
                color: var(--text2);
                font-size: 0.85rem;
                margin-bottom: 0.75rem;
            }
            .timeline-item ul {
                color: var(--text2);
                padding-left: 1.2rem;
            }
            .timeline-item li {
                margin-bottom: 0.35rem;
                font-size: 0.95rem;
            }

            /* Education */
            .edu-grid {
                display: grid;
                gap: 1.25rem;
            }
            .edu-card {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1.25rem 1.5rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 0.5rem;
                transition: all var(--transition);
            }
            .edu-card:hover {
                border-color: var(--accent);
            }
            .edu-card h3 {
                font-size: 1.05rem;
                font-weight: 600;
            }
            .edu-card .school {
                color: var(--text2);
                font-size: 0.9rem;
            }
            .edu-card .year {
                color: var(--accent);
                font-size: 0.9rem;
                font-weight: 500;
                white-space: nowrap;
            }

            /* Languages */
            .lang-list {
                display: flex;
                gap: 1.5rem;
                flex-wrap: wrap;
            }
            .lang-item {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1rem 1.5rem;
                transition: all var(--transition);
            }
            .lang-item:hover {
                border-color: var(--accent);
            }
            .lang-item strong {
                display: block;
                margin-bottom: 0.25rem;
            }
            .lang-item span {
                color: var(--text2);
                font-size: 0.9rem;
            }

            /* Interests */
            .interests {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                margin-top: 1rem;
            }
            .interest {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.6rem 1.2rem;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                font-size: 0.95rem;
                transition: all var(--transition);
            }
            .interest:hover {
                border-color: var(--accent);
                transform: translateY(-2px);
            }

            /* Responsive */
            @media (max-width: 600px) {
                section {
                    padding: 3rem 0;
                }
                .timeline {
                    padding-left: 1.5rem;
                }
                .timeline-item {
                    padding-left: 1rem;
                }
                .timeline-item::before {
                    left: -1.5rem;
                }
                .hero-contact {
                    flex-direction: column;
                    align-items: center;
                }
                .edu-card {
                    flex-direction: column;
                    align-items: flex-start;
                }
                .profile-photo {
                    width: 110px;
                    height: 110px;
                }
            }

            /* Print */
            @page {
                margin: 0.4in;
                size: A4;
            }
            @media print {
                * {
                    color: #111 !important;
                    background: #fff !important;
                    box-shadow: none !important;
                    text-shadow: none !important;
                    -webkit-text-fill-color: #111 !important;
                    -webkit-print-color-adjust: exact !important;
                    print-color-adjust: exact !important;
                }
                body {
                    font-size: 10pt;
                    line-height: 1.35;
                }
                .pdf-btn {
                    display: none !important;
                }
                .hero {
                    min-height: auto;
                    padding: 1rem 0;
                }
                .hero::before {
                    display: none;
                }
                .profile-photo {
                    width: 80px;
                    height: 80px;
                    margin-bottom: 0.75rem;
                    border-color: #ccc !important;
                }
                .hero h1 {
                    font-size: 1.8rem;
                }
                .hero .subtitle {
                    font-size: 1.1rem;
                }
                .hero .location {
                    margin-bottom: 0.75rem;
                }
                .hero-contact a {
                    border-color: #ccc !important;
                    padding: 0.3rem 0.7rem;
                    font-size: 0.78rem;
                }
                section {
                    padding: 1rem 0;
                    break-inside: avoid;
                }
                .section-title {
                    font-size: 1.3rem;
                    margin-bottom: 1rem;
                }
                .section-title::after {
                    background: #111 !important;
                }
                .about-text {
                    font-size: 0.9rem;
                    line-height: 1.5;
                }
                .timeline-item {
                    margin-bottom: 1.5rem;
                }
                .timeline::before {
                    background: #999 !important;
                }
                .timeline-item::before {
                    background: #666 !important;
                }
                .timeline-item h3 {
                    font-size: 1rem;
                }
                .timeline-item li {
                    font-size: 0.82rem;
                    margin-bottom: 2px;
                    line-height: 1.35;
                }
                .skill-card,
                .edu-card,
                .lang-item,
                .interest {
                    border-color: #ccc !important;
                    break-inside: avoid;
                }
                .tag {
                    border: 1px solid #ccc;
                    font-size: 0.78rem;
                }
                .skill-card h3 {
                    font-size: 0.85rem;
                }
                .skills-grid {
                    gap: 0.75rem;
                }
                .edu-card {
                    padding: 0.75rem 1rem;
                }
                .lang-item {
                    padding: 0.5rem 1rem;
                }
                a {
                    text-decoration: underline !important;
                }
            }
        </style>
    </head>
    <body>
        <button class="pdf-btn" onclick="window.print()" title="Enregistrer en PDF via Imprimer > Enregistrer en PDF">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
            PDF
        </button>

        <header class="hero">
            <div class="hero-content">
                <img id="photo" src="./photo.png" alt="" class="profile-photo" width="140" height="140" />
                <h1 id="hero-name"></h1>
                <p id="hero-subtitle" class="subtitle"></p>
                <p id="hero-location" class="location"></p>
                <div id="hero-contact" class="hero-contact"></div>
            </div>
        </header>

        <main>
            <section id="about">
                <div class="container">
                    <h2 id="about-heading" class="section-title"></h2>
                    <p id="about-text" class="about-text"></p>
                </div>
            </section>

            <section id="skills">
                <div class="container">
                    <h2 id="skills-heading" class="section-title"></h2>
                    <div id="skills-grid" class="skills-grid"></div>
                </div>
            </section>

            <section id="experience">
                <div class="container">
                    <h2 id="experience-heading" class="section-title"></h2>
                    <div id="timeline" class="timeline"></div>
                </div>
            </section>

            <section id="education">
                <div class="container">
                    <h2 id="education-heading" class="section-title"></h2>
                    <div id="edu-grid" class="edu-grid"></div>
                </div>
            </section>

            <section id="languages">
                <div class="container">
                    <h2 id="languages-heading" class="section-title"></h2>
                    <div id="lang-list" class="lang-list"></div>
                </div>
            </section>

            <section id="interests">
                <div class="container">
                    <h2 id="interests-heading" class="section-title"></h2>
                    <div id="interests-list" class="interests"></div>
                </div>
            </section>
        </main>

        <script src="../data.js"></script>
        <script>
            (function () {
                var D = window.RESUME_DATA;
                var P = D.personal;
                var lang = "fr";

                function t(obj) { return obj[lang] || obj.en; }

                // Hero
                document.getElementById("photo").alt = "Photo de " + P.name;
                document.getElementById("hero-name").innerHTML =
                    P.firstName + ' <span class="accent">' + P.lastName + "</span>";
                document.getElementById("hero-subtitle").textContent = t(D.title);
                document.getElementById("hero-location").textContent = t(P.location);

                document.getElementById("hero-contact").innerHTML =
                    '<a href="mailto:' + P.email + '">' + P.email + '</a>' +
                    '<a href="tel:' + P.phone + '">' + t(P.phoneDisplay) + '</a>' +
                    '<a href="' + P.githubUrl + '">' + P.githubDisplay + '</a>' +
                    '<a href="' + P.linkedinUrl + '">' + P.linkedinDisplay + '</a>';

                // About
                document.getElementById("about-heading").textContent = D.ui[lang].about_title;
                document.getElementById("about-text").textContent = t(D.about);

                // Skills
                document.getElementById("skills-heading").textContent = D.ui[lang].skills_title;
                var skillsHtml = "";
                Object.keys(D.skills).forEach(function (cat) {
                    skillsHtml += '<div class="skill-card"><h3>' + t(D.skillCategoryLabels[cat]) +
                        '</h3><div class="skill-tags" role="list">';
                    D.skills[cat].forEach(function (s) {
                        skillsHtml += '<span class="tag" role="listitem">' + s + "</span>";
                    });
                    skillsHtml += "</div></div>";
                });
                document.getElementById("skills-grid").innerHTML = skillsHtml;

                // Experience
                document.getElementById("experience-heading").textContent = D.ui[lang].exp_title;
                var expHtml = "";
                D.experience.forEach(function (exp) {
                    expHtml += '<article class="timeline-item">' +
                        '<h3>' + t(exp.role) + '</h3>' +
                        '<div class="company">' + t(exp.company) + '</div>' +
                        '<div class="period">' + t(exp.period) + '</div><ul>';
                    t(exp.description).forEach(function (desc) {
                        expHtml += '<li>' + desc + '</li>';
                    });
                    expHtml += '</ul></article>';
                });
                document.getElementById("timeline").innerHTML = expHtml;

                // Education
                document.getElementById("education-heading").textContent = D.ui[lang].edu_title;
                var eduHtml = "";
                D.education.forEach(function (edu) {
                    eduHtml += '<div class="edu-card"><div>' +
                        '<h3>' + t(edu.degree) + '</h3>' +
                        '<div class="school">' + edu.school + '</div></div>' +
                        '<div class="year">' + edu.startYear + ' — ' + edu.endYear + '</div></div>';
                });
                document.getElementById("edu-grid").innerHTML = eduHtml;

                // Languages
                document.getElementById("languages-heading").textContent = D.ui[lang].lang_title;
                var langHtml = "";
                D.languages.forEach(function (l) {
                    langHtml += '<div class="lang-item"><strong>' + t(l.name) +
                        '</strong><span>' + t(l.level) + '</span></div>';
                });
                document.getElementById("lang-list").innerHTML = langHtml;

                // Interests
                document.getElementById("interests-heading").textContent = D.ui[lang].interests_title;
                var intHtml = "";
                D.interests.forEach(function (item) {
                    intHtml += '<div class="interest"><span aria-hidden="true">' + item.emoji +
                        '</span> <span>' + t(item.label) + '</span></div>';
                });
                document.getElementById("interests-list").innerHTML = intHtml;

                // JSON-LD
                var allSkills = D.skills.languages.concat(D.skills.frameworks, D.skills.tools);
                var jsonLd = {
                    "@context": "https://schema.org",
                    "@type": "Person",
                    name: P.name,
                    jobTitle: t(D.title),
                    telephone: P.phone,
                    email: P.email,
                    address: {
                        "@type": "PostalAddress",
                        addressLocality: "Saint-Nolff",
                        addressRegion: "Bretagne",
                        addressCountry: "FR",
                    },
                    knowsLanguage: D.languages.map(function (l) {
                        return { "@type": "Language", name: t(l.name), alternateName: l.code };
                    }),
                    knowsAbout: allSkills,
                    hasOccupation: D.experience.map(function (exp) {
                        return {
                            "@type": "Role",
                            roleName: t(exp.role),
                            startDate: exp.startDate,
                            endDate: exp.endDate,
                            worksFor: { "@type": "Organization", name: t(exp.company) },
                        };
                    }),
                    alumniOf: (function () {
                        var seen = {};
                        return D.education.filter(function (e) {
                            if (seen[e.school]) return false;
                            seen[e.school] = true;
                            return true;
                        }).map(function (e) {
                            return { "@type": "EducationalOrganization", name: e.school };
                        });
                    })(),
                };
                var ldScript = document.createElement("script");
                ldScript.type = "application/ld+json";
                ldScript.textContent = JSON.stringify(jsonLd);
                document.head.appendChild(ldScript);
            })();
        </script>
    </body>
</html>
