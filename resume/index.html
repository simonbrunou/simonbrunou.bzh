<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <meta
            name="description"
            content="CV de Simon Brunou - Développeur Fullstack avec expérience en développement mobile (Android, iOS), Flutter, React Native, Rust, Kotlin, Swift, Java, JavaScript. Basé en Bretagne, France."
        />
        <meta
            name="keywords"
            content="développeur fullstack, développeur mobile, Android, iOS, Flutter, React Native, Rust, Kotlin, Swift, Java, JavaScript, Python, Spring Boot, Angular, Node.js, Docker, Proxmox, Git, GitLab CI/CD, Terraform"
        />
        <title>CV - Simon Brunou - Développeur Fullstack</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- JSON-LD structured data is generated dynamically from data.js -->

        <style>
            /* Catppuccin Latte (light) */
            :root {
                --bg-page: #e6e9ef;
                --bg-card: #eff1f5;
                --text-primary: #4c4f69;
                --text-secondary: #6c6f85;
                --text-muted: #8c8fa1;
                --accent: #7287fd;
                --accent-soft: rgba(114, 135, 253, 0.1);
                --accent-alt: #8839ef;
                --border-light: #ccd0da;
                --shadow: rgba(76, 79, 105, 0.08);
                --shadow-lg: rgba(76, 79, 105, 0.12);
                --photo-border: rgba(255, 255, 255, 0.9);
                --photo-shadow: rgba(76, 79, 105, 0.2);
                color-scheme: light dark;
            }

            /* Catppuccin Mocha (dark) — auto or manual */
            @media (prefers-color-scheme: dark) { :root:not(.light) { --bg-page: #11111b; --bg-card: #1e1e2e; --text-primary: #cdd6f4; --text-secondary: #a6adc8; --text-muted: #7f849c; --accent: #b4befe; --accent-soft: rgba(180,190,254,0.08); --accent-alt: #cba6f7; --border-light: #313244; --shadow: rgba(17,17,27,0.4); --shadow-lg: rgba(17,17,27,0.6); --photo-border: rgba(205,214,244,0.3); --photo-shadow: rgba(17,17,27,0.5); } }
            :root.dark { --bg-page: #11111b; --bg-card: #1e1e2e; --text-primary: #cdd6f4; --text-secondary: #a6adc8; --text-muted: #7f849c; --accent: #b4befe; --accent-soft: rgba(180,190,254,0.08); --accent-alt: #cba6f7; --border-light: #313244; --shadow: rgba(17,17,27,0.4); --shadow-lg: rgba(17,17,27,0.6); --photo-border: rgba(205,214,244,0.3); --photo-shadow: rgba(17,17,27,0.5); }

            *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                line-height: 1.6;
                color: var(--text-primary);
                background: var(--bg-page);
                -webkit-font-smoothing: antialiased;
            }

            .container {
                max-width: 820px;
                margin: 40px auto;
                background: var(--bg-card);
                box-shadow: 0 1px 3px var(--shadow), 0 8px 30px var(--shadow-lg);
                border-radius: 16px;
                overflow: hidden;
            }

            /* Header */
            .header {
                background: linear-gradient(160deg, var(--accent), var(--accent-alt));
                color: white;
                padding: 40px 40px 32px;
                text-align: center;
                position: relative;
            }

            .header-actions {
                position: absolute;
                top: 14px;
                right: 14px;
                display: flex;
                gap: 8px;
                align-items: center;
            }

            .header-action {
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                height: 38px;
                padding: 0 14px;
                border-radius: 19px;
                cursor: pointer;
                font-family: inherit;
                font-size: 0.8rem;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 6px;
                text-decoration: none;
            }

            .header-action:hover { background: rgba(255, 255, 255, 0.3); }

            .theme-toggle { width: 38px; padding: 0; justify-content: center; border-radius: 50%; }
            .theme-toggle .theme-icon { font-size: 1.1rem; }

            .profile-photo {
                width: 110px;
                height: 110px;
                border-radius: 50%;
                object-fit: cover;
                border: 3px solid white;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
                display: block;
                margin: 0 auto 18px;
            }

            .name {
                font-size: 1.6rem;
                font-weight: 300;
                margin-bottom: 4px;
                letter-spacing: 3px;
                text-transform: uppercase;
                opacity: 0.9;
            }

            .title {
                font-size: 2.2rem;
                font-weight: 700;
                margin-bottom: 24px;
                letter-spacing: -0.5px;
            }

            /* Contact pills */
            .contact-info {
                display: flex;
                justify-content: center;
                gap: 20px;
                flex-wrap: wrap;
                margin-top: 16px;
                list-style: none;
            }

            .contact-item {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 0.85rem;
                background: rgba(255, 255, 255, 0.12);
                padding: 6px 14px;
                border-radius: 20px;
            }

            .contact-item a { color: white; text-decoration: none; }
            .contact-item a:hover { text-decoration: underline; }

            .contact-label {
                font-weight: 600;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                opacity: 0.85;
            }

            /* Body content */
            .main-content { padding: 28px 44px 24px; }
            .section { margin-bottom: 20px; }
            .section:last-child { margin-bottom: 0; }

            .section-title {
                font-size: 0.8rem;
                font-weight: 700;
                color: var(--accent);
                margin-bottom: 12px;
                text-transform: uppercase;
                letter-spacing: 2.5px;
                padding-left: 14px;
                border-left: 3px solid var(--accent);
            }

            .profile-text {
                line-height: 1.6;
                font-size: 0.95rem;
                color: var(--text-secondary);
                padding: 12px 16px;
                background: var(--accent-soft);
                border-radius: 10px;
            }

            /* Timeline items (experience & education) */
            .experience-item,
            .education-item {
                margin-bottom: 18px;
                border-left: 2px solid var(--border-light);
                padding-left: 20px;
                position: relative;
            }

            .experience-item::before,
            .education-item::before {
                content: "";
                position: absolute;
                left: -6px;
                top: 6px;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--bg-card);
                border: 2px solid var(--accent);
            }

            .experience-item:last-child,
            .education-item:last-child { margin-bottom: 0; }

            .experience-item h4,
            .education-item h4 { font-weight: 600; font-size: 1.05rem; margin-bottom: 2px; }

            .company { font-weight: 600; color: var(--accent); font-size: 0.9rem; margin-bottom: 2px; }
            .date { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 10px; font-weight: 500; letter-spacing: 0.3px; }

            .job-description { padding-left: 18px; }
            .job-description li { margin-bottom: 6px; font-size: 0.9rem; line-height: 1.6; color: var(--text-secondary); }
            .job-description li::marker { color: var(--accent); }

            /* Skills */
            .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
            .skill-category h4 { font-weight: 600; margin-bottom: 10px; font-size: 0.9rem; }
            .skill-list { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; }

            .skill-tag {
                color: var(--accent);
                border: 1.5px solid var(--accent);
                padding: 4px 14px;
                border-radius: 20px;
                font-size: 0.8rem;
                font-weight: 500;
                background: transparent;
            }

            /* Languages */
            .languages-list { list-style: none; }
            .language-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
            .language-item:last-child { border-bottom: none; }
            .language-name { font-weight: 500; font-size: 0.9rem; }
            .language-level { background: var(--accent-soft); color: var(--accent); border: 1.5px solid var(--accent); padding: 3px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }

            /* Responsive */
            @media (max-width: 768px) {
                .container { margin: 0; border-radius: 0; }
                .main-content { padding: 24px 20px; }
                .header { padding: 56px 20px 32px; }
                .header-actions { top: 10px; right: 10px; gap: 6px; }
                .header-action { height: 34px; padding: 0 10px; font-size: 0.75rem; }
                .theme-toggle { width: 34px; }
                .contact-info { flex-direction: column; align-items: center; gap: 10px; }
                .title { font-size: 1.6rem; }
                .name { font-size: 1.2rem; }
                .profile-photo { width: 90px; height: 90px; margin-bottom: 12px; }
                .skills-grid { grid-template-columns: 1fr; }
            }

            /* Print */
            @page { margin: 0.4in; size: A4; }

            @media print {
                * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                body { background: white; color: #4c4f69; line-height: 1.4; }
                .container { box-shadow: none; margin: 0; border-radius: 0; background: white; overflow: visible; }
                .header-actions { display: none !important; }
                .header { background: linear-gradient(160deg, #7287fd, #8839ef) !important; padding: 18px 30px 16px; }
                .profile-photo { width: 64px; height: 64px; margin-bottom: 6px; border: none; box-shadow: none; clip-path: circle(50%); }
                .name { font-size: 1.1rem; margin-bottom: 1px; }
                .title { font-size: 1.4rem; margin-bottom: 8px; }
                .contact-info { gap: 5px; margin-top: 6px; }
                .contact-item { background: rgba(255,255,255,0.15) !important; padding: 4px 10px; font-size: 0.78rem; }
                .main-content { padding: 14px 30px 10px; }
                .section { margin-bottom: 8px; }
                .section-title { color: #7287fd; border-left-color: #7287fd; margin-bottom: 6px; font-size: 0.75rem; }
                .profile-text { background: rgba(114,135,253,0.06) !important; padding: 6px 12px; font-size: 0.82rem; line-height: 1.4; }
                .experience-item, .education-item { border-left-color: #ccd0da; margin-bottom: 8px; padding-left: 14px; break-inside: avoid; }
                .experience-item::before, .education-item::before { border-color: #7287fd; background: white !important; }
                .experience-item h4, .education-item h4 { font-size: 0.95rem; }
                .company { color: #7287fd; }
                .date { font-size: 0.76rem; margin-bottom: 3px; }
                .job-description li { font-size: 0.78rem; margin-bottom: 1px; line-height: 1.3; }
                .skills-grid { gap: 8px; }
                .skill-tag { border-color: #7287fd; color: #7287fd; padding: 2px 10px; font-size: 0.75rem; }
                .skill-list { gap: 5px; }
                .language-level { border-color: #7287fd; color: #7287fd; background: rgba(114,135,253,0.06) !important; }
                .header { break-after: avoid; }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header id="resume-header" class="header"></header>
            <div class="main-content">
                <section class="section" id="profile-section"></section>
                <section class="section" id="experience-section"></section>
                <section class="section" id="education-section"></section>
                <section class="section" id="skills-section"></section>
                <section class="section" id="languages-section"></section>
                <section class="section" id="interests-section"></section>
            </div>
        </div>

        <script src="../data.js"></script>
        <script>
            (function () {
                var D = window.RESUME_DATA;
                var P = D.personal;
                var lang = "fr";

                function t(obj) { return obj[lang] || obj.en; }

                // Header
                document.getElementById("resume-header").innerHTML =
                    '<div class="header-actions">' +
                        '<a href="/" class="header-action" title="Voir le site complet"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8a7 7 0 1114 0A7 7 0 011 8z"/><path d="M1 8h14"/><path d="M8 1a10.5 10.5 0 013 7 10.5 10.5 0 01-3 7 10.5 10.5 0 01-3-7 10.5 10.5 0 013-7z"/></svg>Site</a>' +
                        '<a href="/resume/simon-brunou-cv.pdf" download class="header-action" title="Télécharger en PDF"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>PDF</a>' +
                        '<button class="header-action theme-toggle" aria-label="Basculer le thème sombre" title="Basculer le thème"><span class="theme-icon"></span></button>' +
                    '</div>' +
                    '<img src="./photo.png" alt="Photo de profil de ' + P.name + '" class="profile-photo" width="76" height="76" loading="lazy" />' +
                    '<h1 class="name">' + P.name + '</h1>' +
                    '<h2 class="title">' + t(D.title) + '</h2>' +
                    '<ul class="contact-info">' +
                        '<li class="contact-item"><span class="contact-label">Tél :</span> <a href="tel:' + P.phone + '">' + t(P.phoneDisplay) + '</a></li>' +
                        '<li class="contact-item"><span class="contact-label">Email :</span> <a href="mailto:' + P.email + '">' + P.email + '</a></li>' +
                        '<li class="contact-item"><span class="contact-label">Lieu :</span> <span>' + t(P.location) + '</span></li>' +
                        '<li class="contact-item"><span class="contact-label">GitHub :</span> <a href="' + P.githubUrl + '">' + P.githubDisplay + '</a></li>' +
                        '<li class="contact-item"><span class="contact-label">LinkedIn :</span> <a href="' + P.linkedinUrl + '">' + P.linkedinDisplay + '</a></li>' +
                    '</ul>';

                // Profile
                document.getElementById("profile-section").innerHTML =
                    '<h3 class="section-title">Profil</h3>' +
                    '<p class="profile-text">' + t(D.about) + '</p>';

                // Experience
                var expHtml = '<h3 class="section-title">' + D.ui[lang].exp_title + '</h3>';
                D.experience.forEach(function (exp) {
                    expHtml += '<article class="experience-item">' +
                        '<h4>' + t(exp.role) + '</h4>' +
                        '<div class="company">' + t(exp.company) + '</div>' +
                        '<div class="date"><time datetime="' + exp.startDate + '">' + t(exp.period).split(" - ")[0] +
                        '</time> - <time datetime="' + exp.endDate + '">' + t(exp.period).split(" - ")[1] + '</time></div>' +
                        '<ul class="job-description">';
                    t(exp.description).forEach(function (desc) {
                        expHtml += '<li>' + desc + '</li>';
                    });
                    expHtml += '</ul></article>';
                });
                document.getElementById("experience-section").innerHTML = expHtml;

                // Education
                var eduHtml = '<h3 class="section-title">' + D.ui[lang].edu_title + '</h3>';
                D.education.forEach(function (edu) {
                    eduHtml += '<article class="education-item">' +
                        '<h4>' + t(edu.degree) + '</h4>' +
                        '<div class="company">' + edu.school + '</div>' +
                        '<div class="date"><time datetime="' + edu.startYear + '">' + edu.startYear +
                        '</time> - <time datetime="' + edu.endYear + '">' + edu.endYear + '</time></div>' +
                        '</article>';
                });
                document.getElementById("education-section").innerHTML = eduHtml;

                // Skills
                var skillsHtml = '<h3 class="section-title">' + D.ui[lang].skills_title + '</h3><div class="skills-grid">';
                Object.keys(D.skills).forEach(function (cat) {
                    skillsHtml += '<div class="skill-category"><h4>' + t(D.skillCategoryLabels[cat]) + '</h4><ul class="skill-list">';
                    D.skills[cat].forEach(function (s) {
                        skillsHtml += '<li class="skill-tag">' + s + '</li>';
                    });
                    skillsHtml += '</ul></div>';
                });
                skillsHtml += '</div>';
                document.getElementById("skills-section").innerHTML = skillsHtml;

                // Languages
                var langHtml = '<h3 class="section-title">' + D.ui[lang].lang_title + '</h3><ul class="languages-list">';
                D.languages.forEach(function (l) {
                    langHtml += '<li class="language-item"><span class="language-name">' + t(l.name) +
                        '</span><span class="language-level">' + t(l.level) + '</span></li>';
                });
                langHtml += '</ul>';
                document.getElementById("languages-section").innerHTML = langHtml;

                // Interests
                var intHtml = '<h3 class="section-title">' + D.ui[lang].interests_title + '</h3><ul class="skill-list">';
                D.interests.forEach(function (item) {
                    intHtml += '<li class="skill-tag">' + t(item.label) + '</li>';
                });
                intHtml += '</ul>';
                document.getElementById("interests-section").innerHTML = intHtml;

                // JSON-LD
                var allSkills = D.skills.languages.concat(D.skills.frameworks, D.skills.tools);
                var jsonLd = {
                    "@context": "https://schema.org",
                    "@type": "Person",
                    name: P.name,
                    jobTitle: t(D.title),
                    telephone: P.phone,
                    email: P.email,
                    address: { "@type": "PostalAddress", addressLocality: "Saint-Nolff", addressRegion: "Bretagne", addressCountry: "FR" },
                    knowsLanguage: D.languages.map(function (l) { return { "@type": "Language", name: t(l.name), alternateName: l.code }; }),
                    knowsAbout: allSkills,
                    hasOccupation: D.experience.map(function (exp) { return { "@type": "Role", roleName: t(exp.role), startDate: exp.startDate, endDate: exp.endDate, worksFor: { "@type": "Organization", name: t(exp.company) } }; }),
                    alumniOf: (function () { var seen = {}; return D.education.filter(function (e) { if (seen[e.school]) return false; seen[e.school] = true; return true; }).map(function (e) { return { "@type": "EducationalOrganization", name: e.school }; }); })(),
                };
                var ldScript = document.createElement("script");
                ldScript.type = "application/ld+json";
                ldScript.textContent = JSON.stringify(jsonLd);
                document.head.appendChild(ldScript);

                // Theme toggle
                var root = document.documentElement;
                var toggle = document.querySelector(".theme-toggle");
                var icon = toggle.querySelector(".theme-icon");
                var stored = localStorage.getItem("resume-theme");
                var prefersDark = window.matchMedia("(prefers-color-scheme: dark)");

                function isDark() {
                    if (root.classList.contains("dark")) return true;
                    if (root.classList.contains("light")) return false;
                    return prefersDark.matches;
                }

                function updateIcon() { icon.textContent = isDark() ? "\u2600\uFE0F" : "\uD83C\uDF19"; }

                if (stored === "dark") { root.classList.add("dark"); root.classList.remove("light"); }
                else if (stored === "light") { root.classList.add("light"); root.classList.remove("dark"); }
                updateIcon();

                toggle.addEventListener("click", function () {
                    if (isDark()) { root.classList.remove("dark"); root.classList.add("light"); localStorage.setItem("resume-theme", "light"); }
                    else { root.classList.remove("light"); root.classList.add("dark"); localStorage.setItem("resume-theme", "dark"); }
                    updateIcon();
                });

                prefersDark.addEventListener("change", function () { if (!localStorage.getItem("resume-theme")) updateIcon(); });
            })();
        </script>
    </body>
</html>
