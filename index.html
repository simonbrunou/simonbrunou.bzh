        <script>
            (function () {
                var THEME_COLOR_LIGHT = '#fbfaff';
                var THEME_COLOR_DARK  = '#0c0a14';
                document.documentElement.classList.add('js');
                var light = false;
                try {
                    var t = localStorage.getItem('theme');
                    light = (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches));
                } catch (_) {}
                if (light) document.documentElement.classList.add('light');
                // Expose so the toggle handler later in the page can reuse the same source of truth.
                window.__setThemeColor = function (isLight) {
                    var m = document.querySelector('meta[name="theme-color"]');
                    if (m) m.content = isLight ? THEME_COLOR_LIGHT : THEME_COLOR_DARK;
                };
                window.__setThemeColor(light);

                // Safety net: .js .fade-in starts at opacity:0 and relies on
                // a later IntersectionObserver to reveal sections. If the
                // main script throws before reaching the observer setup, the
                // content stays invisible. Schedule a force-reveal pass once
                // the DOM is parsed; the main IIFE clears this handle as soon
                // as the observer is wired so we don't erode the fade effect
                // in the normal path.
                function scheduleFadeRescue() {
                    window.__fadeRescueId = setTimeout(function () {
                        window.__fadeRescueId = null;
                        var fades = document.querySelectorAll('.fade-in');
                        for (var i = 0; i < fades.length; i++) fades[i].classList.add('visible');
                    }, 4000);
                }
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', scheduleFadeRescue, { once: true });
                } else {
                    scheduleFadeRescue();
                }
            })();

        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                /* Iris — dark (default) */
                --bg-page: #0c0a14;
                --bg-elev: rgba(255, 255, 255, 0.03);
                --bg-elev-strong: rgba(255, 255, 255, 0.06);

                                 radial-gradient(ellipse at 20% 50%, rgba(255, 118, 180, 0.22), transparent 55%);
                color-scheme: dark light;
            }

            :root.light {
                /* Iris — light */
                --bg-page: #fbfaff;
                --bg-elev: rgba(26, 23, 38, 0.03);
                --bg-elev-strong: rgba(26, 23, 38, 0.06);
                --border: rgba(26, 23, 38, 0.08);
                --border-strong: rgba(26, 23, 38, 0.12);
                --text-primary: #1a1726;
                --text-secondary: #5f5a6e;
                --text-muted: #8c879a;
                --accent-1: #8e3dd1;
                --accent-2: #a14de3;
                --accent-3: #c84686;
                --accent-soft: rgba(142, 61, 209, 0.08);
                --accent-border: rgba(142, 61, 209, 0.25);
                --status-ok: #4ea863;
                --shadow-soft: 0 6px 18px rgba(120, 80, 170, 0.14);
                --shadow-glow: 0 6px 18px rgba(120, 80, 170, 0.20);
                --gradient-text: linear-gradient(90deg, var(--accent-1), var(--accent-3));
                --gradient-button: linear-gradient(180deg, var(--accent-1), #7530b0);
                --gradient-mesh: radial-gradient(ellipse at 70% 20%, rgba(142, 61, 209, 0.10), transparent 55%),
                                 radial-gradient(ellipse at 20% 50%, rgba(200, 70, 134, 0.08), transparent 55%);
            }

            html, body { background: var(--bg-page); color: var(--text-primary); }

            body {
                font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-size: 16px;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }

            a { color: inherit; text-decoration: none; }
            a:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 3px; border-radius: 4px; }

            h1 { font-size: 3rem; letter-spacing: -0.035em; line-height: 1.0; }
            h2 { font-size: 1.8rem; }
            h3 { font-size: 1.05rem; }

            .accent {
                background: var(--gradient-text);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                color: var(--accent-2); /* fallback when background-clip:text unsupported */
            }

            .section-label {
                font-size: 0.72rem;
                text-transform: uppercase;
                letter-spacing: 0.18em;
                color: var(--text-muted);

            }

            .container { max-width: 880px; margin: 0 auto; padding: 0 24px; }

            .sr-only {
                position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
                overflow: hidden; clip: rect(0, 0, 0, 0); clip-path: inset(50%); white-space: nowrap; border: 0;
            }

            .skip-link {
                position: absolute; top: -100%; left: 0;
                background: var(--accent-1); color: #fff;
                padding: 12px 20px; font-weight: 600; z-index: 200;
                text-decoration: none; border-radius: 0 0 8px 0;
            }
            .skip-link:focus { top: 0; }

            @media (prefers-reduced-motion: reduce) {
                *, *::before, *::after { animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
            }

            /* Focus styles */
            :focus-visible {
                outline: 3px solid var(--accent);
                outline-offset: 3px;
                border-radius: 4px;
            }
            .btn-primary:focus-visible,
            .btn-secondary:focus-visible,

                outline-offset: 3px;
                box-shadow: 0 0 0 3px var(--accent-glow);
            }

            /* Scroll progress */
            .scroll-progress {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                z-index: 150;
                background: linear-gradient(90deg, var(--accent), var(--accent2));
                transform-origin: 0 50%;
                transform: scaleX(0);

            /* Back-to-top button */
            .back-to-top {
                position: fixed;
                bottom: 1.25rem;

                opacity: 0;
                transform: translateY(8px);
                pointer-events: none;
                transition:

                    transform var(--transition),
                    background var(--transition),
                    border-color var(--transition),
                    color var(--transition);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);

            .back-to-top svg {
                width: 1.1rem;
                height: 1.1rem;
            }
            .back-to-top.visible {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;

            .back-to-top:hover {
                border-color: var(--accent);
                color: var(--accent);
                background: var(--bg3);
            }

            .topbar {
                position: sticky;
                top: 0;
                z-index: 50;
                display: flex;
                justify-content: flex-end;
                gap: 8px;
                padding: 14px 0;
                background: var(--bg-page);

            .topbar .chip {

            .topbar .chip:hover { background: var(--bg-elev-strong); border-color: var(--border-strong); }
            .topbar .chip:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }

            .theme-toggle { width: 38px; height: 38px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

            .lang-toggle { display: inline-flex; padding: 0; height: 38px; overflow: hidden; }
            .lang-toggle button {
                background: transparent;
                border: 0;

                font-weight: 500;
                padding: 0 14px;

                height: 100%;
            }
            .lang-toggle button[aria-current="true"] {
                background: var(--gradient-button);
                color: #fff;
                border-radius: 100px;
            }
            .lang-toggle button:focus-visible { outline: 2px solid var(--accent-2); outline-offset: -2px; }

            .hero {

                text-align: center;
                padding: 48px 0 64px;
                overflow: hidden;
            }
            .hero::before {
                content: "";

            .hero-photo {

            .eyebrow {
                font-size: 0.72rem;

            .hero h1 { margin-bottom: 14px; }

            .btn-primary {
                background: var(--gradient-button);

                margin-bottom: 2.5rem;

                display: inline-block;

            .about-text {

            /* Skills */
            .skills-grid {

                gap: 22px;

            @media (max-width: 640px) { .skills-grid { grid-template-columns: 1fr; } }

            .skill-cat {
                background: var(--bg-elev);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 18px 18px 16px;
            }
            .skill-cat-label {

            .chip-skill {
                font-family: "JetBrains Mono", ui-monospace, monospace;

                padding: 4px 10px;

                background: var(--accent-soft);
                border: 1px solid var(--accent-border);
                color: var(--accent-2);
                line-height: 1.4;
            }

            /* Timeline */
            .timeline {
                position: relative;
                padding-left: 2rem;
            }
            .timeline::before {
                content: "";
                position: absolute;
                left: 5px;
                top: 0;
                bottom: 0;
                width: 2px;
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2),
                    transparent
                );
            }
            .timeline-item {
                position: relative;
                margin-bottom: 3rem;
                padding-left: 1.5rem;
            }
            .timeline-item::before {
                content: "";
                position: absolute;
                left: -2rem;
                top: 0.4rem;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--accent);
                border: 2px solid var(--bg);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }
            .timeline-item h3 {
                font-size: 1.15rem;
                font-weight: 700;
                margin-bottom: 0.25rem;
            }
            .timeline-item .company {
                color: var(--accent);
                font-weight: 500;
                font-size: 1rem;
            }
            .timeline-item .period {
                color: var(--text2);
                font-size: 0.85rem;
                margin-bottom: 0.75rem;
            }
            .timeline-item ul {
                color: var(--text2);
                padding-left: 1.2rem;
            }
            .timeline-item li {
                margin-bottom: 0.35rem;
                font-size: 0.95rem;
            }

            /* Education */
            .edu-grid {
                display: grid;
                gap: 1.25rem;
            }
            .edu-card {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1.25rem 1.5rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 0.5rem;
                transition: all var(--transition);
            }
            .edu-card:hover {
                border-color: var(--accent);
            }
            .edu-card h3 {
                font-size: 1.05rem;
                font-weight: 600;
            }
            .edu-card .school {

            /* Animations */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }

            .js .fade-in {
                opacity: 0;
                transform: translateY(20px);
                transition:
                    opacity 0.6s ease-out,
                    transform 0.6s ease-out;
            }
            .js .fade-in.visible {
                opacity: 1;
                transform: translateY(0);
            }

            /* Responsive */
            @media (max-width: 600px) {
                section {
                    padding: 3rem 0;
                }
                .timeline {
                    padding-left: 1.5rem;
                }
                .timeline-item {
                    padding-left: 1rem;
                }
                .timeline-item::before {
                    left: -1.5rem;
                }
                .contact {
                    padding: 2rem 1.5rem;
                }
                .edu-card {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }

            /* Reduced motion */
            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.01ms !important;
                    scroll-behavior: auto !important;
                }
                html {
                    scroll-behavior: auto;
                }
                .js .fade-in {
                    opacity: 1;
                    transform: none;
                }
            }

            /* High contrast mode */
            @media (forced-colors: active) {
                .section-title::after {
                    background: LinkText !important;
                }
                .timeline::before {
                    background: CanvasText !important;
                }
                .timeline-item::before {
                    background: LinkText !important;
                    border-color: Canvas !important;
                    box-shadow: none !important;
                }
                .tag,
                .skill-card,
                .edu-card,
                .lang-item,
                .interest,
                .contact {
                    border: 1px solid CanvasText !important;
                }
                .btn-primary {
                    border: 2px solid LinkText !important;
                }
                .theme-toggle,
                .back-to-top {
                    border: 1px solid CanvasText !important;
                }
                .status {
                    border: 1px solid CanvasText !important;
                }
                .hero-photo {
                    border-color: LinkText !important;
                    box-shadow: none !important;
                }
            }

            /* Print */
            @media print {
                * {
                    color: #111 !important;
                    background: #fff !important;
                    box-shadow: none !important;
                    text-shadow: none !important;
                    -webkit-text-fill-color: #111 !important;
                }
                body {
                    font-size: 11pt;
                    line-height: 1.4;
                }
                .hero {
                    min-height: auto;
                    padding: 1rem 0;
                }
                .hero::before {
                    display: none;
                }
                section {
                    padding: 1rem 0;
                    break-inside: avoid;
                }
                .fade-in {
                    opacity: 1 !important;
                    transform: none !important;
                }
                .lang-toggle,
                .theme-toggle,
                .actions,
                .status,
                .scroll-progress,
                .back-to-top,
                #interests,
                #contact {
                    display: none;
                }
                .section-title::after {
                    background: #111 !important;
                }
                a {
                    text-decoration: underline !important;
                }
                a[href^="mailto:"]::after,
                a[href^="tel:"]::after {
                    content: none;
                }
                .timeline::before {
                    background: #999 !important;
                }
                .timeline-item::before {
                    background: #666 !important;
                    box-shadow: none !important;
                }
                .skill-card,
                .edu-card,
                .lang-item {
                    border-color: #ccc !important;
                    break-inside: avoid;
                }
                .tag {
                    border: 1px solid #ccc;
                }
                .sr-only {
                    position: static !important;
                    width: auto !important;
                    height: auto !important;
                    clip: auto !important;
                    clip-path: none !important;
                    overflow: visible !important;
                    white-space: normal !important;
                    margin: 0 !important;
                    padding: 0 !important;
                }
            }
        </style>
    </head>
    <body>

        <noscript>
            <style>.hero-photo, .theme-toggle, .lang-toggle, .status, .actions, .scroll-progress, .back-to-top { display: none; }</style>
            <div style="max-width:900px;margin:0 auto;padding:2rem 1.5rem;font-family:monospace;">
                <p style="color:#e0e0f0;line-height:1.8;margin-bottom:2rem;">Committed, motivated and serious Fullstack Developer with experience in mobile application development, project management, client communication and regular product delivery. Based in Brittany, France, I build robust applications across the entire stack — from mobile and desktop to backend and middleware — with a passion for Rust and systems programming.</p>
                <p style="margin-bottom:1rem;"><strong>Skills:</strong> <span style="color:#b0b0d0;">Rust, Dart, Kotlin, Swift, Java, JavaScript, TypeScript, Python, C, Flutter, React Native, Android, iOS, React, Electron, Angular, Spring Boot, Node.js, Git, Docker, Proxmox, GitLab CI/CD, Terraform, Figma</span></p>
                <p><a href="mailto:simon.brunou@proton.me" style="color:#6c63ff;">simon.brunou@proton.me</a> &middot; <a href="https://github.com/simonbrunou" style="color:#6c63ff;">GitHub</a> &middot; <a href="https://www.linkedin.com/in/simon-brunou-a7a5a489" style="color:#6c63ff;">LinkedIn</a> &middot; <a href="/resume/" style="color:#6c63ff;">Resume</a></p>
            </div>

        <script src="data.js"></script>
        <script src="render.js"></script>
        <script>
            (function () {
                var D = window.RESUME_DATA;
                var P = D.personal;
                var currentLang = "en";
                // Look up backToTop early so setLang (defined below) can safely reference it
                // regardless of where setLang is invoked in the IIFE.
                var backToTop = document.getElementById("back-to-top");

                // Theme toggle
                function isLight() {
                    return document.documentElement.classList.contains("light");
                }
                function updateThemeIcon() {
                    var isLightNow = isLight();
                    var btn = document.getElementById("theme-toggle");
                    // aria-pressed=true means "light theme is the active choice"
                    if (btn) btn.setAttribute("aria-pressed", isLightNow ? "true" : "false");
                    var moon = document.getElementById("theme-icon-moon");
                    var sun  = document.getElementById("theme-icon-sun");
                    if (moon) moon.hidden = isLightNow;   // hide moon when light theme is active
                    if (sun)  sun.hidden  = !isLightNow;  // show sun when light theme is active
                }
                function toggleTheme() {
                    var light = !isLight();
                    document.documentElement.classList.toggle("light", light);
                    try { localStorage.setItem("theme", light ? "light" : "dark"); } catch (_) {}
                    updateThemeIcon();
                    if (window.__setThemeColor) window.__setThemeColor(light);
                }
                updateThemeIcon();

                // Build translations from shared data
                function buildTranslations(lang) {
                    var t = Object.assign({}, D.ui[lang], {
                        subtitle: D.title[lang],
                        location: P.location[lang],
                        about_text: D.about[lang],
                    });
                    if (D.availability && D.availability.open) {
                        t["availability"] = D.availability.label[lang];
                    }
                    // Skill category labels
                    Object.keys(D.skillCategoryLabels).forEach(function (k) {
                        t["skills_" + k] = D.skillCategoryLabels[k][lang];
                    });
                    // Experience
                    D.experience.forEach(function (exp, i) {
                        var n = i + 1;
                        t["exp" + n + "_role"] = exp.role[lang];
                        t["exp" + n + "_company"] = exp.company[lang];
                        exp.description[lang].forEach(function (desc, j) {
                            t["exp" + n + "_li" + (j + 1)] = desc;
                        });
                    });
                    // Education
                    D.education.forEach(function (edu, i) {
                        t["edu" + (i + 1) + "_degree"] = edu.degree[lang];
                    });
                    // Languages
                    D.languages.forEach(function (l, i) {
                        t["lang" + i + "_name"] = l.name[lang];
                        t["lang" + i + "_level"] = l.level[lang];
                    });
                    // Interests
                    D.interests.forEach(function (item, i) {
                        t["interest" + i] = item.label[lang];
                    });
                    return t;
                }

                // Hero — wire data.js content via textContent (no innerHTML on data values)
                var _storedLang; try { _storedLang = localStorage.getItem('lang'); } catch (_) {}
                var lang = (_storedLang === 'fr') ? 'fr' : 'en';
                var pick = window.SBRender.pickLang;

                document.getElementById('hero-eyebrow').textContent = pick(D.personal.location, lang);
                document.getElementById('hero-role').textContent = pick(D.title, lang);
                document.getElementById('hero-cta').textContent = D.ui[lang].cta + ' →';
                document.getElementById('hero-resume-link').textContent = D.ui[lang].resume_link;

                if (D.availability && D.availability.open) {
                    document.getElementById('hero-status-label').textContent = pick(D.availability.label, lang);
                    document.getElementById('hero-status').hidden = false;
                }

                // About
                document.getElementById('about-eyebrow').textContent = D.ui[lang].about_title;
                document.getElementById('about-heading').textContent = D.ui[lang].section_heading_about;
                document.getElementById('about-text').textContent = pick(D.about, lang);

                // Generate SR summary
                var allSkills = D.skills.languages.concat(D.skills.frameworks, D.skills.tools);
                var langSummary = D.languages.map(function (l) { return l.name.en + " (" + l.level.en + ")"; }).join(", ");
                document.getElementById("sr-summary").innerHTML =
                    "<h1>" + P.name + " — " + D.title.en + "</h1>" +
                    "<p>Email: " + P.email + " | Phone: " + P.phoneDisplay.en + "</p>" +
                    "<p>Location: " + P.location.en + "</p>" +
                    "<p>GitHub: " + P.githubUrl + " | LinkedIn: " + P.linkedinUrl + "</p>" +
                    "<h2>Summary</h2><p>" + D.about.en + "</p>" +
                    "<h2>Skills</h2><p>" + allSkills.join(", ") + "</p>" +
                    "<h2>Languages</h2><p>" + langSummary + "</p>";

                // Skills eyebrow + heading
                document.getElementById('skills-eyebrow').textContent = D.ui[lang].skills_title;
                document.getElementById('skills-heading').textContent = D.ui[lang].section_heading_skills;

                // Generate skills — DOM construction only (no innerHTML for data values)
                var grid = document.getElementById('skills-grid');
                grid.textContent = '';
                ['languages', 'frameworks', 'tools'].forEach(function (cat) {
                    var card = document.createElement('div');
                    card.className = 'skill-cat';

                    var label = document.createElement('div');
                    label.className = 'skill-cat-label';
                    label.textContent = '// ' + pick(D.skillCategoryLabels[cat], lang).toLowerCase();
                    card.appendChild(label);

                    var chips = document.createElement('div');
                    chips.className = 'chips';
                    D.skills[cat].forEach(function (s) {
                        var c = document.createElement('span');
                        c.className = 'chip-skill';
                        c.textContent = s;
                        chips.appendChild(c);
                    });
                    card.appendChild(chips);

                    grid.appendChild(card);
                });

                // Generate experience timeline
                var expHtml = "";
                D.experience.forEach(function (exp, i) {
                    var n = i + 1;
                    expHtml += '<article class="timeline-item">' +
                        '<h3 data-i18n="exp' + n + '_role">' + exp.role.en + "</h3>" +
                        '<div class="company" data-i18n="exp' + n + '_company">' + exp.company.en + "</div>" +
                        '<div class="period"><time datetime="' + exp.startDate + '">' + SBRender.splitPeriod(exp.period.en)[0] +
                        '</time> — <time datetime="' + exp.endDate + '">' + SBRender.splitPeriod(exp.period.en)[1] + "</time></div><ul>";
                    exp.description.en.forEach(function (desc, j) {
                        expHtml += '<li data-i18n="exp' + n + "_li" + (j + 1) + '">' + desc + "</li>";
                    });
                    expHtml += "</ul></article>";
                });
                document.getElementById("timeline").innerHTML = expHtml;

                // Generate education
                var eduHtml = "";
                D.education.forEach(function (edu, i) {
                    eduHtml += '<div class="edu-card"><div>' +
                        '<h3 data-i18n="edu' + (i + 1) + '_degree">' + edu.degree.en + "</h3>" +
                        '<div class="school">' + edu.school + "</div></div>" +
                        '<div class="year"><time datetime="' + edu.startYear + '">' + edu.startYear +
                        '</time> — <time datetime="' + edu.endYear + '">' + edu.endYear + "</time></div></div>";
                });
                document.getElementById("edu-grid").innerHTML = eduHtml;

                // Generate languages
                var langHtml = "";
                D.languages.forEach(function (l, i) {
                    langHtml += '<div class="lang-item">' +
                        '<strong data-i18n="lang' + i + '_name">' + l.name.en + "</strong>" +
                        '<span data-i18n="lang' + i + '_level">' + l.level.en + "</span></div>";
                });
                document.getElementById("lang-list").innerHTML = langHtml;

                // Generate interests
                var intHtml = "";
                D.interests.forEach(function (item, i) {
                    intHtml += '<div class="interest"><span aria-hidden="true">' + item.emoji +
                        '</span> <span data-i18n="interest' + i + '">' + item.label.en + "</span></div>";
                });
                document.getElementById("interests-list").innerHTML = intHtml;

                // Generate contact
                var phDisplay = P.phoneDisplay[currentLang] || P.phoneDisplay.en;
                var emailIcon = '<svg viewBox="0 0 24 24" class="contact-icon" aria-hidden="true" focusable="false"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
                var phoneIcon = '<svg viewBox="0 0 24 24" class="contact-icon" aria-hidden="true" focusable="false"><path d="M5 4h3l2 5-2.5 1.5a11 11 0 005 5L14 13l5 2v3a2 2 0 01-2 2A15 15 0 013 6a2 2 0 012-2z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
                document.getElementById("contact-links").innerHTML =
                    '<a href="mailto:' + P.email + '" class="contact-link" aria-label="Email: ' + P.email + '">' + emailIcon + P.email + "</a>" +
                    '<a href="tel:' + P.phone + '" class="contact-link" aria-label="Phone: ' + phDisplay + '">' + phoneIcon + phDisplay + "</a>" +
                    '<a href="' + P.githubUrl + '" class="contact-link" target="_blank" rel="noopener" aria-label="GitHub (opens in new tab)">GitHub<span class="sr-only"> (opens in new tab)</span></a>' +
                    '<a href="' + P.linkedinUrl + '" class="contact-link" target="_blank" rel="noopener" aria-label="LinkedIn (opens in new tab)">LinkedIn<span class="sr-only"> (opens in new tab)</span></a>';

                // Generate JSON-LD via shared helper (same shape on both pages)
                SBRender.injectJsonLd(D, currentLang);

                // i18n
                function setLang(lang) {
                    currentLang = lang;
                    var t = buildTranslations(lang);
                    document.querySelectorAll("[data-i18n]").forEach(function (el) {
                        var key = el.getAttribute("data-i18n");
                        if (t[key] !== undefined) el.textContent = t[key];
                    });
                    if (t.back_to_top) backToTop.setAttribute("aria-label", t.back_to_top);
                    if (t.theme_toggle) {
                        var tt = document.getElementById("theme-toggle");
                        if (tt) tt.setAttribute("aria-label", t.theme_toggle);
                    }
                    document.documentElement.lang = lang;
                    var btnEn = document.getElementById("btn-en");
                    var btnFr = document.getElementById("btn-fr");
                    btnEn.setAttribute("aria-current", lang === "en" ? "true" : "false");
                    btnFr.setAttribute("aria-current", lang === "fr" ? "true" : "false");
                    // Update phone display for current language
                    var phLink = document.querySelector('.contact-link[aria-label^="Phone"]');
                    if (phLink) {
                        var pd = P.phoneDisplay[lang] || P.phoneDisplay.en;
                        phLink.setAttribute("aria-label", "Phone: " + pd);
                        phLink.lastChild.textContent = " " + pd;
                    }
                    try { localStorage.setItem("lang", lang); } catch (_) {}
                }

                // Scroll progress + back-to-top
                var progressBar = document.getElementById("scroll-progress");
                var ticking = false;
                function updateScrollUI() {
                    var h = document.documentElement;
                    var scrollable = h.scrollHeight - h.clientHeight;
                    var progress = scrollable > 0 ? h.scrollTop / scrollable : 0;
                    progressBar.style.transform = "scaleX(" + progress + ")";
                    backToTop.classList.toggle("visible", h.scrollTop > 600);
                    ticking = false;
                }
                function onScrollOrResize() {
                    if (!ticking) {
                        window.requestAnimationFrame(updateScrollUI);
                        ticking = true;
                    }
                }
                window.addEventListener("scroll", onScrollOrResize, { passive: true });
                window.addEventListener("resize", onScrollOrResize, { passive: true });
                updateScrollUI();
                backToTop.addEventListener("click", function () {
                    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
                    window.scrollTo({ top: 0, behavior: reduce ? "auto" : "smooth" });
                });

                // Fade-in observer. Without IntersectionObserver (old browsers
                // or sandboxed contexts where it's stripped), the .js .fade-in
                // rule would leave sections invisible forever — reveal them
                // immediately as a fallback. Use a `for` loop, not
                // NodeList.forEach, because browsers without IO also tend to
                // lack NodeList.prototype.forEach.
                var fadeEls = document.querySelectorAll(".fade-in");
                if (typeof IntersectionObserver === "function") {
                    var o = new IntersectionObserver(
                        function (entries) {
                            entries.forEach(function (entry) {
                                if (entry.isIntersecting) {
                                    entry.target.classList.add("visible");
                                    o.unobserve(entry.target);
                                }
                            });
                        },
                        { threshold: 0.15 }
                    );
                    for (var i = 0; i < fadeEls.length; i++) o.observe(fadeEls[i]);
                } else {
                    for (var j = 0; j < fadeEls.length; j++) fadeEls[j].classList.add("visible");
                }
                // Observer is wired (or fallback applied) — cancel the head's
                // safety-net rescue so it doesn't reveal off-screen sections
                // prematurely on users who linger above the fold.
                if (window.__fadeRescueId) {
                    clearTimeout(window.__fadeRescueId);
                    window.__fadeRescueId = null;
                }

                // Wire up the (no-longer-inline) button handlers so CSP can drop 'unsafe-inline'.
                document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
                document.getElementById("btn-en").addEventListener("click", function () { setLang("en"); });
                document.getElementById("btn-fr").addEventListener("click", function () { setLang("fr"); });

                // Language resolution priority: URL ?lang= (for hreflang
                // arrivals and shareable French links) > localStorage > default EN.
                var initLang;
                try {
                    var params = new URLSearchParams(window.location.search);
                    var fromUrl = params.get("lang");
                    if (fromUrl === "fr" || fromUrl === "en") initLang = fromUrl;
                } catch (_) {}
                if (!initLang) {
                    try { initLang = localStorage.getItem("lang"); } catch (_) {}
                }
                if (initLang === "fr") setLang("fr");
            })();
        </script>
