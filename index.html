        <script>
            (function () {
                var THEME_COLOR_LIGHT = '#eef0f7';
                var THEME_COLOR_DARK  = '#1a1a2e';
                document.documentElement.classList.add('js');
                var light = false;
                try {
                    var t = localStorage.getItem('theme');
                    light = (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches));
                } catch (_) {}
                if (light) document.documentElement.classList.add('light');
                // Expose so the toggle handler later in the page can reuse the same source of truth.
                window.__setThemeColor = function (isLight) {
                    var m = document.querySelector('meta[name="theme-color"]');
                    if (m) m.content = isLight ? THEME_COLOR_LIGHT : THEME_COLOR_DARK;
                };
                window.__setThemeColor(light);
            })();
        </script>

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0f0f1a;
                --bg2: #1a1a2e;
                --bg3: #222240;
                --text: #e0e0f0;
                --text2: #b0b0d0;
                --accent: #6c63ff;
                --accent-strong: #4f46e5; /* AA-safe vs #fff: ≥6.7:1 */
                --accent2: #ff6b6b;
                --accent-glow: rgba(108, 99, 255, 0.15);
                --radius: 12px;
                --easing: cubic-bezier(0.22, 1, 0.36, 1);
                --transition: 250ms var(--easing);
                --transition-fast: 150ms var(--easing);
            }
            /* Light theme — bumped --bg to give cards visible separation, darker --bg3 for clear borders */
            :root.light {
                --bg: #eef0f7;
                --bg2: #ffffff;
                --bg3: #d8dae6;
                --text: #1a1a2e;
                --text2: #4a4a6a;
                --accent: #5a52e0;
                --accent-strong: #4338ca; /* darker for light bg */
                --accent2: #e04040;
                --accent-glow: rgba(90, 82, 224, 0.1);
            }

            html {
                scroll-behavior: smooth;
                font-size: 16px;
            }
            body {
                font-family:
                    "JetBrains Mono", ui-monospace, "Cascadia Code",
                    "Source Code Pro", Menlo, Consolas, monospace;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                overflow-x: hidden;
            }
            a {
                color: var(--accent);
                text-decoration: none;
                transition: color var(--transition);
            }
            a:hover {
                color: var(--accent2);
            }
            h1,
            h2,
            h3 {
                line-height: 1.2;
            }
            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 0 1.5rem;
            }

            /* Skip link */
            .skip-link {
                position: absolute;
                top: -100%;
                left: 0;
                background: var(--accent);
                color: #fff;
                padding: 0.75rem 1.5rem;
                z-index: 200;
                font-weight: 600;
                border-radius: 0 0 var(--radius) 0;
                text-decoration: none;
                transition: top 0.2s;
            }
            .skip-link:focus {
                top: 0;
                color: #fff;
            }

            /* Screen-reader / ATS only */
            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                clip-path: inset(50%);
                white-space: nowrap;
                border: 0;
            }

            /* Focus styles */
            :focus-visible {
                outline: 3px solid var(--accent);
                outline-offset: 3px;
                border-radius: 4px;
            }
            .btn-primary:focus-visible,
            .btn-secondary:focus-visible,
            .contact-link:focus-visible {
                outline-offset: 3px;
                box-shadow: 0 0 0 3px var(--accent-glow);
            }
            .lang-toggle button:focus-visible {
                outline-offset: -2px;
            }

            /* Scroll progress */
            .scroll-progress {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                z-index: 150;
                background: linear-gradient(90deg, var(--accent), var(--accent2));
                transform-origin: 0 50%;
                transform: scaleX(0);
                will-change: transform;
                pointer-events: none;
            }

            /* Back-to-top button */
            .back-to-top {
                position: fixed;
                bottom: 1.25rem;
                right: 1.25rem;
                z-index: 90;
                width: 2.75rem;
                height: 2.75rem;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg2);
                color: var(--text);
                border: 1px solid var(--bg3);
                border-radius: 50%;
                cursor: pointer;
                opacity: 0;
                transform: translateY(8px);
                pointer-events: none;
                transition:
                    opacity var(--transition),
                    transform var(--transition),
                    background var(--transition),
                    border-color var(--transition),
                    color var(--transition);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            }
            .back-to-top svg {
                width: 1.1rem;
                height: 1.1rem;
            }
            .back-to-top.visible {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }
            .back-to-top:hover {
                border-color: var(--accent);
                color: var(--accent);
                background: var(--bg3);
            }

            /* Language toggle */
            .lang-toggle {
                position: fixed;
                top: 1rem;
                right: 1rem;
                z-index: 100;
                display: flex;
                gap: 0;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                overflow: hidden;
            }
            .lang-toggle button {
                background: none;
                border: none;
                color: var(--text2);
                padding: 0.45rem 0.8rem;
                font-size: 0.8rem;
                font-weight: 600;
                cursor: pointer;
                transition: all var(--transition);
                letter-spacing: 0.05em;
            }
            .lang-toggle button.active {
                background: var(--accent);
                color: #fff;
            }
            .lang-toggle button:hover:not(.active) {
                color: var(--text);
                background: var(--bg3);
            }

            /* Theme toggle */
            .theme-toggle {
                position: fixed;
                top: 1rem;
                right: 7.5rem;
                z-index: 100;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                color: var(--text2);
                padding: 0.45rem 0.55rem;
                cursor: pointer;
                transition: all var(--transition);
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            .theme-toggle:hover {
                color: var(--text);
                background: var(--bg3);
            }
            .theme-toggle svg {
                width: 1.05rem;
                height: 1.05rem;
                stroke: currentColor;
                fill: none;
                stroke-width: 1.75;
            }

            /* Availability badge — reserve space to prevent CLS while JS injects content */
            #availability-badge {
                min-height: 2rem;
                margin-bottom: 1rem;
            }
            .availability {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.35rem 0.9rem;
                border-radius: 2rem;
                font-size: 0.8rem;
                font-weight: 600;
                letter-spacing: 0.03em;
                background: rgba(46, 204, 113, 0.1);
                color: #2ecc71;
                border: 1px solid rgba(46, 204, 113, 0.25);
            }
            .availability::before {
                content: "";
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #2ecc71;
                animation: pulse-dot 2s ease-out infinite;
            }
            /* Halo pulse — dot stays solid, ring radiates outward and fades */
            @keyframes pulse-dot {
                0%   { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.55); }
                70%  { box-shadow: 0 0 0 7px rgba(46, 204, 113, 0); }
                100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
            }

            /* Hero photo */
            .hero-photo {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 3px solid var(--accent);
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
                margin-bottom: 1.5rem;
                object-fit: cover;
            }

            /* Hero */
            .hero {
                min-height: clamp(560px, 80vh, 760px);
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
            }
            .hero-content {
                text-align: center;
                position: relative;
                z-index: 1;
                animation: fadeUp 0.8s ease-out;
            }
            .hero h1 {
                font-size: clamp(2.5rem, 6vw, 4rem);
                font-weight: 800;
                letter-spacing: -0.02em;
                margin-bottom: 0.5rem;
            }
            .hero h1 .accent {
                color: var(--accent);
            }
            .hero .subtitle {
                font-size: clamp(1.1rem, 2.5vw, 1.5rem);
                color: var(--text2);
                margin-bottom: 1rem;
            }
            .hero .location {
                color: var(--text2);
                font-size: 0.95rem;
                margin-bottom: 2rem;
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
            }
            .hero .location svg {
                width: 0.95em;
                height: 0.95em;
                stroke: currentColor;
                fill: none;
                stroke-width: 1.75;
                opacity: 0.8;
            }
            .hero-links {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
            }
            .hero-links a {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.65rem 1.3rem;
                border-radius: var(--radius);
                font-weight: 500;
                font-size: 0.9rem;
                transition: all var(--transition);
            }
            .btn-primary {
                background: var(--accent);
                color: #fff !important;
            }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
            }
            .btn-secondary {
                border: 1.5px solid var(--bg3);
                color: var(--text) !important;
                background: var(--bg2);
            }
            .btn-secondary:hover {
                border-color: var(--accent);
                background: var(--bg3);
            }
            /* Icon-only ghost variant — square, compact, just an SVG inside */
            .btn-icon {
                padding: 0.55rem;
                aspect-ratio: 1 / 1;
                color: var(--text2) !important;
            }
            .btn-icon:hover {
                color: var(--text) !important;
            }
            .btn-icon svg {
                width: 1.15rem;
                height: 1.15rem;
                stroke: currentColor;
                fill: none;
                stroke-width: 1.75;
                display: block;
            }

            /* Sections */
            section {
                padding: 5rem 0;
            }
            .section-title {
                font-size: 2rem;
                font-weight: 700;
                margin-bottom: 2.5rem;
                position: relative;
                display: inline-block;
            }
            .section-title::after {
                content: "";
                position: absolute;
                bottom: -8px;
                left: 0;
                width: 50px;
                height: 3px;
                background: var(--accent);
                border-radius: 2px;
            }

            /* About */
            .about-text {
                font-size: 1.1rem;
                color: var(--text2);
                max-width: 60ch;
                line-height: 1.7;
            }

            /* Skills */
            .skills-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1.5rem;
            }
            .skill-card {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1.5rem;
                transition: all var(--transition);
            }
            .skill-card:hover {
                border-color: var(--accent);
                transform: translateY(-3px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }
            .skill-card h3 {
                font-size: 1rem;
                color: var(--text2);
                margin-bottom: 1rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
            }
            .skill-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
                list-style: none;
            }
            .tag {
                padding: 0.35rem 0.75rem;
                background: var(--bg3);
                border-radius: 8px;
                font-size: 0.85rem;
                color: var(--text);
                transition: all var(--transition);
            }
            .skill-card .tag:hover {
                background: var(--accent-strong);
                color: #fff;
                transform: translateY(-1px);
            }

            /* Timeline */
            .timeline {
                position: relative;
                padding-left: 2rem;
            }
            .timeline::before {
                content: "";
                position: absolute;
                left: 5px;
                top: 0;
                bottom: 0;
                width: 2px;
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2),
                    transparent
                );
            }
            .timeline-item {
                position: relative;
                margin-bottom: 3rem;
                padding-left: 1.5rem;
            }
            .timeline-item::before {
                content: "";
                position: absolute;
                left: -2rem;
                top: 0.4rem;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--accent);
                border: 2px solid var(--bg);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }
            .timeline-item h3 {
                font-size: 1.15rem;
                font-weight: 700;
                margin-bottom: 0.25rem;
            }
            .timeline-item .company {
                color: var(--accent);
                font-weight: 500;
                font-size: 1rem;
            }
            .timeline-item .period {
                color: var(--text2);
                font-size: 0.85rem;
                margin-bottom: 0.75rem;
            }
            .timeline-item ul {
                color: var(--text2);
                padding-left: 1.2rem;
            }
            .timeline-item li {
                margin-bottom: 0.35rem;
                font-size: 0.95rem;
            }

            /* Education */
            .edu-grid {
                display: grid;
                gap: 1.25rem;
            }
            .edu-card {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1.25rem 1.5rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 0.5rem;
                transition: all var(--transition);
            }
            .edu-card:hover {
                border-color: var(--accent);
            }
            .edu-card h3 {
                font-size: 1.05rem;
                font-weight: 600;
            }
            .edu-card .school {
                color: var(--text2);
                font-size: 0.9rem;
            }
            .edu-card .year {
                color: var(--accent);
                font-size: 0.9rem;
                font-weight: 500;
                white-space: nowrap;
            }

            /* Interests */
            .interests {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                margin-top: 1rem;
            }
            .interest {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.6rem 1.2rem;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                font-size: 0.95rem;
                transition: all var(--transition);
            }
            .interest:hover {
                border-color: var(--accent);
                transform: translateY(-2px);
            }

            /* Contact */
            .contact {
                background: var(--bg2);
                border-radius: var(--radius);
                padding: 2rem 2.5rem;
                border: 1px solid var(--bg3);
                text-align: center;
            }
            .contact h2 {
                margin-bottom: 1rem;
            }
            .contact p {
                color: var(--text2);
                margin-bottom: 2rem;
            }
            .contact-links {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
                font-style: normal;
            }
            .contact-link {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.65rem 1.3rem;
                border: 1.5px solid var(--bg3);
                border-radius: var(--radius);
                color: var(--text) !important;
                font-size: 0.9rem;
                transition: all var(--transition);
            }
            .contact-link:hover {
                border-color: var(--accent);
                background: var(--accent-glow);
            }
            .contact-link .contact-icon {
                width: 1rem;
                height: 1rem;
                stroke: currentColor;
                fill: none;
                stroke-width: 1.75;
                opacity: 0.85;
            }

            /* Languages */
            .lang-list {
                display: flex;
                gap: 1.5rem;
                flex-wrap: wrap;
            }
            .lang-item {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 0.5rem 0.85rem;
                transition: all var(--transition);
            }
            .lang-item:hover {
                border-color: var(--accent);
            }
            .lang-item strong {
                display: block;
                margin-bottom: 0.25rem;
            }
            .lang-item span {
                color: var(--text2);
                font-size: 0.9rem;
            }

            /* Footer */
            footer {
                text-align: center;
                padding: 2rem 0;
                color: var(--text2);
                font-size: 0.85rem;
                border-top: 1px solid var(--bg3);
            }

            /* Animations */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .js .fade-in {
                opacity: 0;
                transform: translateY(20px);
                transition:
                    opacity 0.6s ease-out,
                    transform 0.6s ease-out;
            }
            .js .fade-in.visible {
                opacity: 1;
                transform: translateY(0);
            }

            /* Responsive */
            @media (max-width: 600px) {
                section {
                    padding: 3rem 0;
                }
                .timeline {
                    padding-left: 1.5rem;
                }
                .timeline-item {
                    padding-left: 1rem;
                }
                .timeline-item::before {
                    left: -1.5rem;
                }
                .contact {
                    padding: 2rem 1.5rem;
                }
                .edu-card {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }

            /* Reduced motion */
            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.01ms !important;
                    scroll-behavior: auto !important;
                }
                html {
                    scroll-behavior: auto;
                }
                .js .fade-in {
                    opacity: 1;
                    transform: none;
                }
                .availability::before {
                    animation: none;
                }
            }

            /* High contrast mode */
            @media (forced-colors: active) {
                .section-title::after {
                    background: LinkText !important;
                }
                .timeline::before {
                    background: CanvasText !important;
                }
                .timeline-item::before {
                    background: LinkText !important;
                    border-color: Canvas !important;
                    box-shadow: none !important;
                }
                .tag,
                .skill-card,
                .edu-card,
                .lang-item,
                .interest,
                .contact {
                    border: 1px solid CanvasText !important;
                }
                .btn-primary {
                    border: 2px solid LinkText !important;
                }
                .theme-toggle,
                .back-to-top {
                    border: 1px solid CanvasText !important;
                }
                .availability {
                    border: 1px solid CanvasText !important;
                }
                .hero-photo {
                    border-color: LinkText !important;
                    box-shadow: none !important;
                }
            }

            /* Print */
            @media print {
                * {
                    color: #111 !important;
                    background: #fff !important;
                    box-shadow: none !important;
                    text-shadow: none !important;
                    -webkit-text-fill-color: #111 !important;
                }
                body {
                    font-size: 11pt;
                    line-height: 1.4;
                }
                .hero {
                    min-height: auto;
                    padding: 1rem 0;
                }
                .hero::before {
                    display: none;
                }
                section {
                    padding: 1rem 0;
                    break-inside: avoid;
                }
                .fade-in {
                    opacity: 1 !important;
                    transform: none !important;
                }
                .lang-toggle,
                .theme-toggle,
                .hero-links,
                .availability,
                .scroll-progress,
                .back-to-top,
                #interests,
                #contact {
                    display: none;
                }
                .section-title::after {
                    background: #111 !important;
                }
                a {
                    text-decoration: underline !important;
                }
                a[href^="mailto:"]::after,
                a[href^="tel:"]::after {
                    content: none;
                }
                .timeline::before {
                    background: #999 !important;
                }
                .timeline-item::before {
                    background: #666 !important;
                    box-shadow: none !important;
                }
                .skill-card,
                .edu-card,
                .lang-item {
                    border-color: #ccc !important;
                    break-inside: avoid;
                }
                .tag {
                    border: 1px solid #ccc;
                }
                .sr-only {
                    position: static !important;
                    width: auto !important;
                    height: auto !important;
                    clip: auto !important;
                    clip-path: none !important;
                    overflow: visible !important;
                    white-space: normal !important;
                    margin: 0 !important;
                    padding: 0 !important;
                }
            }
        </style>
    </head>
    <body>
        <a href="#main-content" class="skip-link" data-i18n="skip_link">Skip to main content</a>

        <div id="scroll-progress" class="scroll-progress" aria-hidden="true"></div>

        <div id="sr-summary" class="sr-only" role="region" aria-label="Resume summary"></div>

        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false">
            <svg id="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12" stroke-linecap="round"/></svg>
            <svg id="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke-linejoin="round"/></svg>
        </button>

        <div class="lang-toggle" role="group" aria-label="Language selector">
            <button id="btn-en" type="button" class="active" aria-pressed="true">EN</button>
            <button id="btn-fr" type="button" aria-pressed="false">FR</button>
        </div>

        <header class="hero">
            <div class="hero-content">
                <img src="/resume/photo.png" alt="Simon Brunou" class="hero-photo" width="120" height="120" loading="eager" />
                <h1 id="hero-name">Simon <span class="accent">Brunou</span></h1>
                <p class="subtitle" data-i18n="subtitle">Fullstack Developer</p>
                <p class="location"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 22s8-7.58 8-13a8 8 0 10-16 0c0 5.42 8 13 8 13z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="9" r="2.5"/></svg><span data-i18n="location">Saint-Nolff, Brittany, France</span></p>
                <div id="availability-badge"></div>
                <div id="hero-links" class="hero-links"></div>
            </div>
        </header>

        <main id="main-content" tabindex="-1">
            <section id="about" aria-labelledby="about-heading">
                <div class="container">
                    <h2 id="about-heading" class="section-title" data-i18n="about_title">About</h2>
                    <p class="about-text" data-i18n="about_text"></p>
                </div>
            </section>

            <section id="skills" aria-labelledby="skills-heading">
                <div class="container fade-in">
                    <h2 id="skills-heading" class="section-title" data-i18n="skills_title">Skills</h2>
                    <div id="skills-grid" class="skills-grid"></div>
                </div>
            </section>

            <section id="experience" aria-labelledby="experience-heading">
                <div class="container fade-in">
                    <h2 id="experience-heading" class="section-title" data-i18n="exp_title">Experience</h2>
                    <div id="timeline" class="timeline"></div>
                </div>
            </section>

            <section id="education" aria-labelledby="education-heading">
                <div class="container fade-in">
                    <h2 id="education-heading" class="section-title" data-i18n="edu_title">Education</h2>
                    <div id="edu-grid" class="edu-grid"></div>
                </div>
            </section>

            <section id="languages" aria-labelledby="languages-heading">
                <div class="container fade-in">
                    <h2 id="languages-heading" class="section-title" data-i18n="lang_title">Languages</h2>
                    <div id="lang-list" class="lang-list"></div>
                </div>
            </section>

            <section id="interests" aria-labelledby="interests-heading">
                <div class="container fade-in">
                    <h2 id="interests-heading" class="section-title" data-i18n="interests_title">Interests</h2>
                    <div id="interests-list" class="interests"></div>
                </div>
            </section>

            <section id="contact" aria-labelledby="contact-heading">
                <div class="container fade-in">
                    <div class="contact">
                        <h2 id="contact-heading" class="section-title" data-i18n="contact_title">Let's Connect</h2>
                        <p data-i18n="contact_text"></p>
                        <address id="contact-links" class="contact-links"></address>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="container">
                <p data-i18n="footer"></p>
            </div>
        </footer>

        <button id="back-to-top" class="back-to-top" type="button" aria-label="Back to top">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M12 19V5" />
                <path d="M5 12l7-7 7 7" />
            </svg>
        </button>

        <noscript>
            <style>.hero-photo, .theme-toggle, .lang-toggle, #availability-badge, .scroll-progress, .back-to-top { display: none; }</style>
            <div style="max-width:900px;margin:0 auto;padding:2rem 1.5rem;font-family:monospace;">
                <p style="color:#e0e0f0;line-height:1.8;margin-bottom:2rem;">Committed, motivated and serious Fullstack Developer with experience in mobile application development, project management, client communication and regular product delivery. Based in Brittany, France, I build robust applications across the entire stack — from mobile and desktop to backend and middleware — with a passion for Rust and systems programming.</p>
                <p style="margin-bottom:1rem;"><strong>Skills:</strong> <span style="color:#b0b0d0;">Rust, Dart, Kotlin, Swift, Java, JavaScript, TypeScript, Python, C, Flutter, React Native, Android, iOS, React, Electron, Angular, Spring Boot, Node.js, Git, Docker, Proxmox, GitLab CI/CD, Terraform, Figma</span></p>
                <p><a href="mailto:simon.brunou@proton.me" style="color:#6c63ff;">simon.brunou@proton.me</a> &middot; <a href="https://github.com/simonbrunou" style="color:#6c63ff;">GitHub</a> &middot; <a href="https://www.linkedin.com/in/simon-brunou-a7a5a489" style="color:#6c63ff;">LinkedIn</a> &middot; <a href="/resume/" style="color:#6c63ff;">Resume</a></p>
            </div>
        </noscript>

        <script src="data.js"></script>
        <script src="render.js"></script>
        <script>
            (function () {
                var D = window.RESUME_DATA;
                var P = D.personal;
                var currentLang = "en";
                // Look up backToTop early so setLang (defined below) can safely reference it
                // regardless of where setLang is invoked in the IIFE.
                var backToTop = document.getElementById("back-to-top");

                // Theme toggle
                function isLight() {
                    return document.documentElement.classList.contains("light");
                }
                function updateThemeIcon() {
                    var sun = document.getElementById("theme-icon-sun");
                    var moon = document.getElementById("theme-icon-moon");
                    var btn = document.getElementById("theme-toggle");
                    // Show the icon for the OPPOSITE theme (clicking sun \u2192 goes light, etc.)
                    var light = isLight();
                    if (light) {
                        sun.style.display = "none";
                        moon.style.display = "";
                    } else {
                        sun.style.display = "";
                        moon.style.display = "none";
                    }
                    // aria-pressed=true means "light theme is the active choice"
                    if (btn) btn.setAttribute("aria-pressed", light ? "true" : "false");
                }
                function toggleTheme() {
                    var light = !isLight();
                    document.documentElement.classList.toggle("light", light);
                    try { localStorage.setItem("theme", light ? "light" : "dark"); } catch (_) {}
                    updateThemeIcon();
                    if (window.__setThemeColor) window.__setThemeColor(light);
                }
                updateThemeIcon();

                // Build translations from shared data
                function buildTranslations(lang) {
                    var t = Object.assign({}, D.ui[lang], {
                        subtitle: D.title[lang],
                        location: P.location[lang],
                        about_text: D.about[lang],
                    });
                    if (D.availability && D.availability.open) {
                        t["availability"] = D.availability.label[lang];
                    }
                    // Skill category labels
                    Object.keys(D.skillCategoryLabels).forEach(function (k) {
                        t["skills_" + k] = D.skillCategoryLabels[k][lang];
                    });
                    // Experience
                    D.experience.forEach(function (exp, i) {
                        var n = i + 1;
                        t["exp" + n + "_role"] = exp.role[lang];
                        t["exp" + n + "_company"] = exp.company[lang];
                        exp.description[lang].forEach(function (desc, j) {
                            t["exp" + n + "_li" + (j + 1)] = desc;
                        });
                    });
                    // Education
                    D.education.forEach(function (edu, i) {
                        t["edu" + (i + 1) + "_degree"] = edu.degree[lang];
                    });
                    // Languages
                    D.languages.forEach(function (l, i) {
                        t["lang" + i + "_name"] = l.name[lang];
                        t["lang" + i + "_level"] = l.level[lang];
                    });
                    // Interests
                    D.interests.forEach(function (item, i) {
                        t["interest" + i] = item.label[lang];
                    });
                    return t;
                }

                // Hero name is server-rendered in the HTML (LCP).

                // Generate availability badge
                if (D.availability && D.availability.open) {
                    document.getElementById("availability-badge").innerHTML =
                        '<span class="availability" data-i18n="availability">' + D.availability.label.en + '</span>';
                }

                var heroLinks = document.getElementById("hero-links");
                var ghIcon = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 1.5a10.5 10.5 0 00-3.32 20.46c.53.1.72-.23.72-.5v-1.78c-2.92.63-3.54-1.41-3.54-1.41-.48-1.21-1.17-1.53-1.17-1.53-.96-.65.07-.64.07-.64 1.06.07 1.62 1.09 1.62 1.09.94 1.6 2.46 1.14 3.06.87.1-.68.37-1.14.66-1.4-2.33-.27-4.78-1.16-4.78-5.18 0-1.14.41-2.07 1.08-2.8-.11-.27-.47-1.34.1-2.78 0 0 .88-.28 2.88 1.07a10 10 0 015.24 0c2-1.35 2.88-1.07 2.88-1.07.57 1.44.21 2.51.1 2.78a4.04 4.04 0 011.08 2.8c0 4.03-2.46 4.91-4.8 5.17.38.33.72.97.72 1.95v2.9c0 .28.19.61.73.5A10.5 10.5 0 0012 1.5z" fill="currentColor" stroke="none"/></svg>';
                var liIcon = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M20.45 20.45h-3.55V14.9c0-1.32-.03-3.03-1.85-3.03-1.85 0-2.13 1.44-2.13 2.93v5.65H9.36V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 110-4.12 2.06 2.06 0 010 4.12zM7.12 20.45H3.56V9h3.56v11.45z" fill="currentColor" stroke="none"/></svg>';
                heroLinks.innerHTML =
                    '<a href="mailto:' + P.email + '" class="btn-primary" data-i18n="cta">Get in Touch</a>' +
                    '<a href="/resume/" class="btn-secondary" data-i18n="resume_link">Resume</a>' +
                    '<a href="' + P.githubUrl + '" class="btn-secondary btn-icon" target="_blank" rel="noopener" aria-label="GitHub (opens in new tab)">' + ghIcon + '</a>' +
                    '<a href="' + P.linkedinUrl + '" class="btn-secondary btn-icon" target="_blank" rel="noopener" aria-label="LinkedIn (opens in new tab)">' + liIcon + '</a>';

                // Generate SR summary
                var allSkills = D.skills.languages.concat(D.skills.frameworks, D.skills.tools);
                var langSummary = D.languages.map(function (l) { return l.name.en + " (" + l.level.en + ")"; }).join(", ");
                document.getElementById("sr-summary").innerHTML =
                    "<h1>" + P.name + " — " + D.title.en + "</h1>" +
                    "<p>Email: " + P.email + " | Phone: " + P.phoneDisplay.en + "</p>" +
                    "<p>Location: " + P.location.en + "</p>" +
                    "<p>GitHub: " + P.githubUrl + " | LinkedIn: " + P.linkedinUrl + "</p>" +
                    "<h2>Summary</h2><p>" + D.about.en + "</p>" +
                    "<h2>Skills</h2><p>" + allSkills.join(", ") + "</p>" +
                    "<h2>Languages</h2><p>" + langSummary + "</p>";

                // Generate skills
                var skillsHtml = "";
                Object.keys(D.skills).forEach(function (cat) {
                    skillsHtml += '<div class="skill-card"><h3 data-i18n="skills_' + cat + '">' +
                        D.skillCategoryLabels[cat].en + '</h3><ul class="skill-tags">';
                    D.skills[cat].forEach(function (s) {
                        skillsHtml += '<li class="tag">' + s + "</li>";
                    });
                    skillsHtml += "</ul></div>";
                });
                document.getElementById("skills-grid").innerHTML = skillsHtml;

                // Generate experience timeline
                var expHtml = "";
                D.experience.forEach(function (exp, i) {
                    var n = i + 1;
                    expHtml += '<article class="timeline-item">' +
                        '<h3 data-i18n="exp' + n + '_role">' + exp.role.en + "</h3>" +
                        '<div class="company" data-i18n="exp' + n + '_company">' + exp.company.en + "</div>" +
                        '<div class="period"><time datetime="' + exp.startDate + '">' + SBRender.splitPeriod(exp.period.en)[0] +
                        '</time> — <time datetime="' + exp.endDate + '">' + SBRender.splitPeriod(exp.period.en)[1] + "</time></div><ul>";
                    exp.description.en.forEach(function (desc, j) {
                        expHtml += '<li data-i18n="exp' + n + "_li" + (j + 1) + '">' + desc + "</li>";
                    });
                    expHtml += "</ul></article>";
                });
                document.getElementById("timeline").innerHTML = expHtml;

                // Generate education
                var eduHtml = "";
                D.education.forEach(function (edu, i) {
                    eduHtml += '<div class="edu-card"><div>' +
                        '<h3 data-i18n="edu' + (i + 1) + '_degree">' + edu.degree.en + "</h3>" +
                        '<div class="school">' + edu.school + "</div></div>" +
                        '<div class="year"><time datetime="' + edu.startYear + '">' + edu.startYear +
                        '</time> — <time datetime="' + edu.endYear + '">' + edu.endYear + "</time></div></div>";
                });
                document.getElementById("edu-grid").innerHTML = eduHtml;

                // Generate languages
                var langHtml = "";
                D.languages.forEach(function (l, i) {
                    langHtml += '<div class="lang-item">' +
                        '<strong data-i18n="lang' + i + '_name">' + l.name.en + "</strong>" +
                        '<span data-i18n="lang' + i + '_level">' + l.level.en + "</span></div>";
                });
                document.getElementById("lang-list").innerHTML = langHtml;

                // Generate interests
                var intHtml = "";
                D.interests.forEach(function (item, i) {
                    intHtml += '<div class="interest"><span aria-hidden="true">' + item.emoji +
                        '</span> <span data-i18n="interest' + i + '">' + item.label.en + "</span></div>";
                });
                document.getElementById("interests-list").innerHTML = intHtml;

                // Generate contact
                var phDisplay = P.phoneDisplay[currentLang] || P.phoneDisplay.en;
                var emailIcon = '<svg viewBox="0 0 24 24" class="contact-icon" aria-hidden="true" focusable="false"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
                var phoneIcon = '<svg viewBox="0 0 24 24" class="contact-icon" aria-hidden="true" focusable="false"><path d="M5 4h3l2 5-2.5 1.5a11 11 0 005 5L14 13l5 2v3a2 2 0 01-2 2A15 15 0 013 6a2 2 0 012-2z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
                document.getElementById("contact-links").innerHTML =
                    '<a href="mailto:' + P.email + '" class="contact-link" aria-label="Email: ' + P.email + '">' + emailIcon + P.email + "</a>" +
                    '<a href="tel:' + P.phone + '" class="contact-link" aria-label="Phone: ' + phDisplay + '">' + phoneIcon + phDisplay + "</a>" +
                    '<a href="' + P.githubUrl + '" class="contact-link" target="_blank" rel="noopener" aria-label="GitHub (opens in new tab)">GitHub<span class="sr-only"> (opens in new tab)</span></a>' +
                    '<a href="' + P.linkedinUrl + '" class="contact-link" target="_blank" rel="noopener" aria-label="LinkedIn (opens in new tab)">LinkedIn<span class="sr-only"> (opens in new tab)</span></a>';

                // Generate JSON-LD via shared helper (same shape on both pages)
                SBRender.injectJsonLd(D, currentLang);

                // i18n
                function setLang(lang) {
                    currentLang = lang;
                    var t = buildTranslations(lang);
                    document.querySelectorAll("[data-i18n]").forEach(function (el) {
                        var key = el.getAttribute("data-i18n");
                        if (t[key] !== undefined) el.textContent = t[key];
                    });
                    if (t.back_to_top) backToTop.setAttribute("aria-label", t.back_to_top);
                    if (t.theme_toggle) {
                        var tt = document.getElementById("theme-toggle");
                        if (tt) tt.setAttribute("aria-label", t.theme_toggle);
                    }
                    document.documentElement.lang = lang;
                    var btnEn = document.getElementById("btn-en");
                    var btnFr = document.getElementById("btn-fr");
                    btnEn.classList.toggle("active", lang === "en");
                    btnFr.classList.toggle("active", lang === "fr");
                    btnEn.setAttribute("aria-pressed", lang === "en" ? "true" : "false");
                    btnFr.setAttribute("aria-pressed", lang === "fr" ? "true" : "false");
                    // Update phone display for current language
                    var phLink = document.querySelector('.contact-link[aria-label^="Phone"]');
                    if (phLink) {
                        var pd = P.phoneDisplay[lang] || P.phoneDisplay.en;
                        phLink.setAttribute("aria-label", "Phone: " + pd);
                        phLink.lastChild.textContent = " " + pd;
                    }
                    try { localStorage.setItem("lang", lang); } catch (_) {}
                }

                // Scroll progress + back-to-top
                var progressBar = document.getElementById("scroll-progress");
                var ticking = false;
                function updateScrollUI() {
                    var h = document.documentElement;
                    var scrollable = h.scrollHeight - h.clientHeight;
                    var progress = scrollable > 0 ? h.scrollTop / scrollable : 0;
                    progressBar.style.transform = "scaleX(" + progress + ")";
                    backToTop.classList.toggle("visible", h.scrollTop > 600);
                    ticking = false;
                }
                function onScrollOrResize() {
                    if (!ticking) {
                        window.requestAnimationFrame(updateScrollUI);
                        ticking = true;
                    }
                }
                window.addEventListener("scroll", onScrollOrResize, { passive: true });
                window.addEventListener("resize", onScrollOrResize, { passive: true });
                updateScrollUI();
                backToTop.addEventListener("click", function () {
                    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
                    window.scrollTo({ top: 0, behavior: reduce ? "auto" : "smooth" });
                });

                // Fade-in observer
                var o = new IntersectionObserver(
                    function (entries) {
                        entries.forEach(function (entry) {
                            if (entry.isIntersecting) {
                                entry.target.classList.add("visible");
                                o.unobserve(entry.target);
                            }
                        });
                    },
                    { threshold: 0.15 }
                );
                document.querySelectorAll(".fade-in").forEach(function (el) { o.observe(el); });

                // Wire up the (no-longer-inline) button handlers so CSP can drop 'unsafe-inline'.
                document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
                document.getElementById("btn-en").addEventListener("click", function () { setLang("en"); });
                document.getElementById("btn-fr").addEventListener("click", function () { setLang("fr"); });

                // Language resolution priority: URL ?lang= (for hreflang
                // arrivals and shareable French links) > localStorage > default EN.
                var initLang;
                try {
                    var params = new URLSearchParams(window.location.search);
                    var fromUrl = params.get("lang");
                    if (fromUrl === "fr" || fromUrl === "en") initLang = fromUrl;
                } catch (_) {}
                if (!initLang) {
                    try { initLang = localStorage.getItem("lang"); } catch (_) {}
                }
                if (initLang === "fr") setLang("fr");
            })();
        </script>
    </body>
</html>
