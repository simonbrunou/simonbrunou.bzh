        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0f0f1a;
                --bg2: #1a1a2e;
                --bg3: #222240;
                --text: #e0e0f0;
                --text2: #b0b0d0;
                --accent: #6c63ff;
                --accent2: #ff6b6b;
                --accent-glow: rgba(108, 99, 255, 0.15);
                --radius: 12px;
                --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            html {
                scroll-behavior: smooth;
                font-size: 16px;
            }
            body {
                font-family:
                    "JetBrains Mono", ui-monospace, "Cascadia Code",
                    "Source Code Pro", Menlo, Consolas, monospace;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                overflow-x: hidden;
            }
            a {
                color: var(--accent);
                text-decoration: none;
                transition: color var(--transition);
            }
            a:hover {
                color: var(--accent2);
            }
            h1,
            h2,
            h3 {
                line-height: 1.2;
            }
            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 0 1.5rem;
            }

            /* Skip link */
            .skip-link {
                position: absolute;
                top: -100%;
                left: 0;
                background: var(--accent);
                color: #fff;
                padding: 0.75rem 1.5rem;
                z-index: 200;
                font-weight: 600;
                border-radius: 0 0 var(--radius) 0;
                text-decoration: none;
                transition: top 0.2s;
            }
            .skip-link:focus {
                top: 0;
                color: #fff;
            }

            /* Screen-reader / ATS only */
            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                clip-path: inset(50%);
                white-space: nowrap;
                border: 0;
            }

            /* Focus styles */
            :focus-visible {
                outline: 3px solid var(--accent);
                outline-offset: 3px;
                border-radius: 4px;
            }
            .btn-primary:focus-visible,
            .btn-secondary:focus-visible,
            .contact-link:focus-visible {
                outline-offset: 3px;
                box-shadow: 0 0 0 3px var(--accent-glow);
            }
            .lang-toggle button:focus-visible {
                outline-offset: -2px;
            }

            /* Language toggle */
            .lang-toggle {
                position: fixed;
                top: 1rem;
                right: 1rem;
                z-index: 100;
                display: flex;
                gap: 0;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                overflow: hidden;
            }
            .lang-toggle button {
                background: none;
                border: none;
                color: var(--text2);
                padding: 0.45rem 0.8rem;
                font-size: 0.8rem;
                font-weight: 600;
                cursor: pointer;
                transition: all var(--transition);
                letter-spacing: 0.05em;
            }
            .lang-toggle button.active {
                background: var(--accent);
                color: #fff;
            }
            .lang-toggle button:hover:not(.active) {
                color: var(--text);
                background: var(--bg3);
            }

            /* Hero */
            .hero {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
            }
            .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(
                        ellipse at 30% 50%,
                        var(--accent-glow),
                        transparent 60%
                    ),
                    radial-gradient(
                        ellipse at 70% 50%,
                        rgba(255, 107, 107, 0.08),
                        transparent 60%
                    );
            }
            .hero-content {
                text-align: center;
                position: relative;
                z-index: 1;
                animation: fadeUp 0.8s ease-out;
            }
            .hero h1 {
                font-size: clamp(2.5rem, 6vw, 4rem);
                font-weight: 800;
                letter-spacing: -0.02em;
                margin-bottom: 0.5rem;
            }
            .hero h1 .accent {
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .hero .subtitle {
                font-size: clamp(1.1rem, 2.5vw, 1.5rem);
                color: var(--text2);
                margin-bottom: 1rem;
            }
            .hero .location {
                color: var(--text2);
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }
            .hero .location::before {
                content: "📍 ";
            }
            .hero-links {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
            }
            .hero-links a {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.65rem 1.3rem;
                border-radius: var(--radius);
                font-weight: 500;
                font-size: 0.9rem;
                transition: all var(--transition);
            }
            .btn-primary {
                background: var(--accent);
                color: #fff !important;
            }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
            }
            .btn-secondary {
                border: 1.5px solid var(--bg3);
                color: var(--text) !important;
                background: var(--bg2);
            }
            .btn-secondary:hover {
                border-color: var(--accent);
                background: var(--bg3);
            }

            /* Sections */
            section {
                padding: 5rem 0;
            }
            .section-title {
                font-size: 1.8rem;
                font-weight: 700;
                margin-bottom: 2.5rem;
                position: relative;
                display: inline-block;
            }
            .section-title::after {
                content: "";
                position: absolute;
                bottom: -8px;
                left: 0;
                width: 50px;
                height: 3px;
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    var(--accent2)
                );
                border-radius: 2px;
            }

            /* About */
            .about-text {
                font-size: 1.1rem;
                color: var(--text2);
                max-width: 700px;
                line-height: 1.8;
            }

            /* Skills */
            .skills-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1.5rem;
            }
            .skill-card {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1.5rem;
                transition: all var(--transition);
            }
            .skill-card:hover {
                border-color: var(--accent);
                transform: translateY(-3px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }
            .skill-card h3 {
                font-size: 1rem;
                color: var(--text2);
                margin-bottom: 1rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
            }
            .skill-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .tag {
                padding: 0.35rem 0.75rem;
                background: var(--bg3);
                border-radius: 8px;
                font-size: 0.85rem;
                color: var(--text);
                transition: all var(--transition);
            }
            .skill-card:hover .tag {
                background: var(--accent-glow);
                color: var(--accent);
            }

            /* Timeline */
            .timeline {
                position: relative;
                padding-left: 2rem;
            }
            .timeline::before {
                content: "";
                position: absolute;
                left: 5px;
                top: 0;
                bottom: 0;
                width: 2px;
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent2),
                    transparent
                );
            }
            .timeline-item {
                position: relative;
                margin-bottom: 3rem;
                padding-left: 1.5rem;
            }
            .timeline-item::before {
                content: "";
                position: absolute;
                left: -2rem;
                top: 0.4rem;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--accent);
                border: 2px solid var(--bg);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }
            .timeline-item h3 {
                font-size: 1.15rem;
                font-weight: 700;
                margin-bottom: 0.25rem;
            }
            .timeline-item .company {
                color: var(--accent);
                font-weight: 500;
                font-size: 1rem;
            }
            .timeline-item .period {
                color: var(--text2);
                font-size: 0.85rem;
                margin-bottom: 0.75rem;
            }
            .timeline-item ul {
                color: var(--text2);
                padding-left: 1.2rem;
            }
            .timeline-item li {
                margin-bottom: 0.35rem;
                font-size: 0.95rem;
            }

            /* Education */
            .edu-grid {
                display: grid;
                gap: 1.25rem;
            }
            .edu-card {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1.25rem 1.5rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 0.5rem;
                transition: all var(--transition);
            }
            .edu-card:hover {
                border-color: var(--accent);
            }
            .edu-card h3 {
                font-size: 1.05rem;
                font-weight: 600;
            }
            .edu-card .school {
                color: var(--text2);
                font-size: 0.9rem;
            }
            .edu-card .year {
                color: var(--accent);
                font-size: 0.9rem;
                font-weight: 500;
                white-space: nowrap;
            }

            /* Interests */
            .interests {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                margin-top: 1rem;
            }
            .interest {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.6rem 1.2rem;
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                font-size: 0.95rem;
                transition: all var(--transition);
            }
            .interest:hover {
                border-color: var(--accent);
                transform: translateY(-2px);
            }

            /* Contact */
            .contact {
                background: var(--bg2);
                border-radius: var(--radius);
                padding: 3rem;
                border: 1px solid var(--bg3);
                text-align: center;
            }
            .contact h2 {
                margin-bottom: 1rem;
            }
            .contact p {
                color: var(--text2);
                margin-bottom: 2rem;
            }
            .contact-links {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
                font-style: normal;
            }
            .contact-link {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.65rem 1.3rem;
                border: 1.5px solid var(--bg3);
                border-radius: var(--radius);
                color: var(--text) !important;
                font-size: 0.9rem;
                transition: all var(--transition);
            }
            .contact-link:hover {
                border-color: var(--accent);
                background: var(--accent-glow);
            }

            /* Languages */
            .lang-list {
                display: flex;
                gap: 1.5rem;
                flex-wrap: wrap;
            }
            .lang-item {
                background: var(--bg2);
                border: 1px solid var(--bg3);
                border-radius: var(--radius);
                padding: 1rem 1.5rem;
                transition: all var(--transition);
            }
            .lang-item:hover {
                border-color: var(--accent);
            }
            .lang-item strong {
                display: block;
                margin-bottom: 0.25rem;
            }
            .lang-item span {
                color: var(--text2);
                font-size: 0.9rem;
            }

            /* Footer */
            footer {
                text-align: center;
                padding: 2rem 0;
                color: var(--text2);
                font-size: 0.85rem;
                border-top: 1px solid var(--bg3);
            }

            /* Animations */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .js .fade-in {
                opacity: 0;
                transform: translateY(20px);
                transition:
                    opacity 0.6s ease-out,
                    transform 0.6s ease-out;
            }
            .js .fade-in.visible {
                opacity: 1;
                transform: translateY(0);
            }

            /* Responsive */
            @media (max-width: 600px) {
                section {
                    padding: 3rem 0;
                }
                .timeline {
                    padding-left: 1.5rem;
                }
                .timeline-item {
                    padding-left: 1rem;
                }
                .timeline-item::before {
                    left: -1.5rem;
                }
                .contact {
                    padding: 2rem 1.5rem;
                }
                .edu-card {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }

            /* Reduced motion */
            @media (prefers-reduced-motion: reduce) {
                *,
                *::before,
                *::after {
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.01ms !important;
                    scroll-behavior: auto !important;
                }
                html {
                    scroll-behavior: auto;
                }
                .js .fade-in {
                    opacity: 1;
                    transform: none;
                }
            }

            /* High contrast mode */
            @media (forced-colors: active) {
                .section-title::after {
                    background: LinkText !important;
                }
                .timeline::before {
                    background: CanvasText !important;
                }
                .timeline-item::before {
                    background: LinkText !important;
                    border-color: Canvas !important;
                    box-shadow: none !important;
                }
                .tag,
                .skill-card,
                .edu-card,
                .lang-item,
                .interest,
                .contact {
                    border: 1px solid CanvasText !important;
                }
                .btn-primary {
                    border: 2px solid LinkText !important;
                }
            }

            /* Print */
            @media print {
                * {
                    color: #111 !important;
                    background: #fff !important;
                    box-shadow: none !important;
                    text-shadow: none !important;
                    -webkit-text-fill-color: #111 !important;
                }
                body {
                    font-size: 11pt;
                    line-height: 1.4;
                }
                .hero {
                    min-height: auto;
                    padding: 1rem 0;
                }
                .hero::before {
                    display: none;
                }
                section {
                    padding: 1rem 0;
                    break-inside: avoid;
                }
                .fade-in {
                    opacity: 1 !important;
                    transform: none !important;
                }
                .lang-toggle,
                .hero-links,
                #interests,
                #contact {
                    display: none;
                }
                .section-title::after {
                    background: #111 !important;
                }
                a {
                    text-decoration: underline !important;
                }
                a[href^="mailto:"]::after,
                a[href^="tel:"]::after {
                    content: none;
                }
                .timeline::before {
                    background: #999 !important;
                }
                .timeline-item::before {
                    background: #666 !important;
                    box-shadow: none !important;
                }
                .skill-card,
                .edu-card,
                .lang-item {
                    border-color: #ccc !important;
                    break-inside: avoid;
                }
                .tag {
                    border: 1px solid #ccc;
                }
                .sr-only {
                    position: static !important;
                    width: auto !important;
                    height: auto !important;
                    clip: auto !important;
                    clip-path: none !important;
                    overflow: visible !important;
                    white-space: normal !important;
                    margin: 0 !important;
                    padding: 0 !important;
                }
            }
        </style>
    </head>

        <script src="data.js"></script>
        <script>
            (function () {
                var D = window.RESUME_DATA;
                var P = D.personal;
                var currentLang = "en";

                // Build translations from shared data
                function buildTranslations(lang) {
                    var t = Object.assign({}, D.ui[lang], {
                        subtitle: D.title[lang],
                        location: P.location[lang],
                        about_text: D.about[lang],
                    });
                    // Skill category labels
                    Object.keys(D.skillCategoryLabels).forEach(function (k) {
                        t["skills_" + k] = D.skillCategoryLabels[k][lang];
                    });
                    // Experience
                    D.experience.forEach(function (exp, i) {
                        var n = i + 1;
                        t["exp" + n + "_role"] = exp.role[lang];
                        t["exp" + n + "_company"] = exp.company[lang];
                        exp.description[lang].forEach(function (desc, j) {
                            t["exp" + n + "_li" + (j + 1)] = desc;
                        });
                    });
                    // Education
                    D.education.forEach(function (edu, i) {
                        t["edu" + (i + 1) + "_degree"] = edu.degree[lang];
                    });
                    // Languages
                    D.languages.forEach(function (l, i) {
                        t["lang" + i + "_name"] = l.name[lang];
                        t["lang" + i + "_level"] = l.level[lang];
                    });
                    // Interests
                    D.interests.forEach(function (item, i) {
                        t["interest" + i] = item.label[lang];
                    });
                    return t;
                }

                // Generate hero
                var heroName = document.getElementById("hero-name");
                heroName.innerHTML = P.firstName + ' <span class="accent">' + P.lastName + "</span>";

                var heroLinks = document.getElementById("hero-links");
                heroLinks.innerHTML =
                    '<a href="mailto:' + P.email + '" class="btn-primary" data-i18n="cta">Get in Touch</a>' +
                    '<a href="/resume/" class="btn-secondary" data-i18n="resume_link">Resume</a>' +
                    '<a href="' + P.githubUrl + '" class="btn-secondary" target="_blank" rel="noopener" aria-label="GitHub (opens in new tab)">GitHub<span class="sr-only"> (opens in new tab)</span></a>' +
                    '<a href="' + P.linkedinUrl + '" class="btn-secondary" target="_blank" rel="noopener" aria-label="LinkedIn (opens in new tab)">LinkedIn<span class="sr-only"> (opens in new tab)</span></a>';

                // Generate SR summary
                var allSkills = D.skills.languages.concat(D.skills.frameworks, D.skills.tools);
                var langSummary = D.languages.map(function (l) { return l.name.en + " (" + l.level.en + ")"; }).join(", ");
                document.getElementById("sr-summary").innerHTML =
                    "<h1>" + P.name + " — " + D.title.en + "</h1>" +
                    "<p>Email: " + P.email + " | Phone: " + P.phoneDisplay.en + "</p>" +
                    "<p>Location: " + P.location.en + "</p>" +
                    "<p>GitHub: " + P.githubUrl + " | LinkedIn: " + P.linkedinUrl + "</p>" +
                    "<h2>Summary</h2><p>" + D.about.en + "</p>" +
                    "<h2>Skills</h2><p>" + allSkills.join(", ") + "</p>" +
                    "<h2>Languages</h2><p>" + langSummary + "</p>";

                // Generate skills
                var skillsHtml = "";
                Object.keys(D.skills).forEach(function (cat) {
                    skillsHtml += '<div class="skill-card"><h3 data-i18n="skills_' + cat + '">' +
                        D.skillCategoryLabels[cat].en + '</h3><div class="skill-tags" role="list">';
                    D.skills[cat].forEach(function (s) {
                        skillsHtml += '<span class="tag" role="listitem">' + s + "</span>";
                    });
                    skillsHtml += "</div></div>";
                });
                document.getElementById("skills-grid").innerHTML = skillsHtml;

                // Generate experience timeline
                var expHtml = "";
                D.experience.forEach(function (exp, i) {
                    var n = i + 1;
                    expHtml += '<article class="timeline-item">' +
                        '<h3 data-i18n="exp' + n + '_role">' + exp.role.en + "</h3>" +
                        '<div class="company" data-i18n="exp' + n + '_company">' + exp.company.en + "</div>" +
                        '<div class="period"><time datetime="' + exp.startDate + '">' + exp.period.en.split(" — ")[0] +
                        '</time> — <time datetime="' + exp.endDate + '">' + exp.period.en.split(" — ")[1] + "</time></div><ul>";
                    exp.description.en.forEach(function (desc, j) {
                        expHtml += '<li data-i18n="exp' + n + "_li" + (j + 1) + '">' + desc + "</li>";
                    });
                    expHtml += "</ul></article>";
                });
                document.getElementById("timeline").innerHTML = expHtml;

                // Generate education
                var eduHtml = "";
                D.education.forEach(function (edu, i) {
                    eduHtml += '<div class="edu-card"><div>' +
                        '<h3 data-i18n="edu' + (i + 1) + '_degree">' + edu.degree.en + "</h3>" +
                        '<div class="school">' + edu.school + "</div></div>" +
                        '<div class="year"><time datetime="' + edu.startYear + '">' + edu.startYear +
                        '</time> — <time datetime="' + edu.endYear + '">' + edu.endYear + "</time></div></div>";
                });
                document.getElementById("edu-grid").innerHTML = eduHtml;

                // Generate languages
                var langHtml = "";
                D.languages.forEach(function (l, i) {
                    langHtml += '<div class="lang-item">' +
                        '<strong data-i18n="lang' + i + '_name">' + l.name.en + "</strong>" +
                        '<span data-i18n="lang' + i + '_level">' + l.level.en + "</span></div>";
                });
                document.getElementById("lang-list").innerHTML = langHtml;

                // Generate interests
                var intHtml = "";
                D.interests.forEach(function (item, i) {
                    intHtml += '<div class="interest"><span aria-hidden="true">' + item.emoji +
                        '</span> <span data-i18n="interest' + i + '">' + item.label.en + "</span></div>";
                });
                document.getElementById("interests-list").innerHTML = intHtml;

                // Generate contact
                document.getElementById("contact-links").innerHTML =
                    '<a href="mailto:' + P.email + '" class="contact-link" aria-label="Email: ' + P.email + '"><span aria-hidden="true">✉️</span> ' + P.email + "</a>" +
                    '<a href="tel:' + P.phone + '" class="contact-link" aria-label="Phone: ' + P.phoneDisplay.en + '"><span aria-hidden="true">📞</span> ' + P.phoneDisplay.en + "</a>" +
                    '<a href="' + P.githubUrl + '" class="contact-link" target="_blank" rel="noopener" aria-label="GitHub (opens in new tab)">GitHub<span class="sr-only"> (opens in new tab)</span></a>' +
                    '<a href="' + P.linkedinUrl + '" class="contact-link" target="_blank" rel="noopener" aria-label="LinkedIn (opens in new tab)">LinkedIn<span class="sr-only"> (opens in new tab)</span></a>';

                // Generate JSON-LD
                var jsonLd = {
                    "@context": "https://schema.org",
                    "@type": "Person",
                    name: P.name,
                    url: P.websiteUrl,
                    email: P.email,
                    telephone: P.phone,
                    jobTitle: D.title.en,
                    address: {
                        "@type": "PostalAddress",
                        addressLocality: "Saint-Nolff",
                        addressRegion: "Brittany",
                        addressCountry: "FR",
                    },
                    knowsLanguage: D.languages.map(function (l) {
                        return { "@type": "Language", name: l.name.en, alternateName: l.code };
                    }),
                    knowsAbout: allSkills.concat(["Mobile Development", "Fullstack Development", "DevOps"]),
                    hasOccupation: D.experience.map(function (exp) {
                        return {
                            "@type": "Role",
                            roleName: exp.role.en,
                            startDate: exp.startDate,
                            endDate: exp.endDate,
                            description: exp.description.en.join(". "),
                            worksFor: { "@type": "Organization", name: exp.company.en },
                        };
                    }),
                    alumniOf: (function () {
                        var seen = {};
                        return D.education.filter(function (e) {
                            if (seen[e.school]) return false;
                            seen[e.school] = true;
                            return true;
                        }).map(function (e) {
                            return { "@type": "EducationalOrganization", name: e.school };
                        });
                    })(),
                    hasCredential: D.education.map(function (e) {
                        return {
                            "@type": "EducationalOccupationalCredential",
                            credentialCategory: "degree",
                            name: e.degree.en,
                            recognizedBy: { "@type": "EducationalOrganization", name: e.school },
                            dateCreated: e.endYear,
                        };
                    }),
                    sameAs: [P.githubUrl, P.linkedinUrl],
                };
                var ldScript = document.createElement("script");
                ldScript.type = "application/ld+json";
                ldScript.textContent = JSON.stringify(jsonLd);
                document.head.appendChild(ldScript);

                // i18n
                window.setLang = function (lang) {
                    currentLang = lang;
                    var t = buildTranslations(lang);
                    document.querySelectorAll("[data-i18n]").forEach(function (el) {
                        var key = el.getAttribute("data-i18n");
                        if (t[key] !== undefined) el.textContent = t[key];
                    });
                    document.documentElement.lang = lang;
                    var btnEn = document.getElementById("btn-en");
                    var btnFr = document.getElementById("btn-fr");
                    btnEn.classList.toggle("active", lang === "en");
                    btnFr.classList.toggle("active", lang === "fr");
                    btnEn.setAttribute("aria-pressed", lang === "en" ? "true" : "false");
                    btnFr.setAttribute("aria-pressed", lang === "fr" ? "true" : "false");
                    try { localStorage.setItem("lang", lang); } catch (_) {}
                };

                // Fade-in observer
                var o = new IntersectionObserver(
                    function (entries) {
                        entries.forEach(function (entry) {
                            if (entry.isIntersecting) {
                                entry.target.classList.add("visible");
                                o.unobserve(entry.target);
                            }
                        });
                    },
                    { threshold: 0.15 }
                );
                document.querySelectorAll(".fade-in").forEach(function (el) { o.observe(el); });

                // Restore saved language
                var saved;
                try { saved = localStorage.getItem("lang"); } catch (_) {}
                if (saved === "fr") setLang("fr");
            })();
        </script>
    </body>
</html>
